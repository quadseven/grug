# grugthink on OKE (v2). Modern k8s-oke pattern, mirroring grug's own
# deployments: arm64-pinned, registry-pull, non-root, DD-tagged. Image
# registry + tag are PLACEHOLDERS the deploy workflow rewrites (no registry
# host committed). SESSION_SECRET is generated in-cluster by the deploy step
# into the `grugthink-secrets` Secret (idempotent - kept across redeploys).
apiVersion: v1
kind: Namespace
metadata:
  name: grugthink
  labels: {app.kubernetes.io/part-of: grug}
---
# Config + bot data (faiss index, grugthink_config.yaml the dashboard writes)
# must survive restarts - the #1 grugthink prod bug was losing config on
# restart because it lived on ephemeral container storage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grugthink-data
  namespace: grugthink
spec:
  accessModes: [ReadWriteOnce]
  # local-path (node-local disk): the pod is pinned to a BYON LAN node (mac-air)
  # via nodeSelector, and OCI block volumes (oci-bv, the cluster default) can't
  # attach to non-OCI nodes. The Postgres/pgvector rearchitecture will retire
  # this PVC entirely.
  storageClassName: local-path
  resources:
    requests: {storage: 5Gi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grugthink
  namespace: grugthink
  labels:
    app: grugthink
    tags.datadoghq.com/service: grugthink
    tags.datadoghq.com/env: prod
spec:
  replicas: 1
  # RWO PVC - one writer at a time; recreate so the old pod releases the
  # volume before the new one mounts it.
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: grugthink}
  template:
    metadata:
      labels:
        app: grugthink
        tags.datadoghq.com/service: grugthink
        tags.datadoghq.com/env: prod
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: registry-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: grugthink
          image: REGISTRY_PLACEHOLDER/grugthink:TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - {name: http, containerPort: 8080}
          env:
            # LLM: owned spark-gateway is the ALWAYS-tried-first primary for
            # chat AND embeddings (no Gemini key set here, so that bonus
            # fallback tier stays disabled). POOLSIDE_API_KEY/
            # OPENROUTER_API_KEY below (envFrom grugthink-llm-fallback) are a
            # bounded, single-shot LAST-RESORT chat fallback, engaged only
            # when the gateway produces nothing usable - see bot/prompts.py's
            # query_model and llm_clients.py's _FALLBACK_TIMEOUT comment.
            - {name: SPARK_GATEWAY_URL, value: http://spark-gateway.spark-gateway.svc:8080}
            - {name: OLLAMA_URLS, value: http://spark-gateway.spark-gateway.svc:8080}
            # Chat model on the Cave gateway (was defaulting to llama3.2:3b -> 503).
            - {name: OLLAMA_MODELS, value: "qwen3.5:122b"}
            - {name: USE_OLLAMA_EMBEDDINGS, value: "true"}
            - {name: GRUGBOT_DATA_DIR, value: /data}
            - {name: LOG_LEVEL, value: INFO}
            - {name: MULTIBOT_API_PORT, value: "8080"}
            # Dashboard is reached only in-cluster / over the tailnet, so OAuth
            # login is disabled; admin endpoints are network-isolated. Flip to
            # false + wire DISCORD_CLIENT_ID/SECRET to require Discord login.
            - {name: DISABLE_OAUTH, value: "true"}
            - {name: DD_SERVICE, value: grugthink}
            - {name: DD_ENV, value: prod}
            - name: DD_AGENT_HOST
              valueFrom: {fieldRef: {fieldPath: status.hostIP}}
            # LLM Observability (2026-07-13): grug-elder already emits real
            # ml_app:grug-elder spans (services/webhook, services/api); grugthink's
            # Discord chat had none at all - a genuine gap, not a UI/filter issue.
            # Distinct ml_app so the two review/chat pipelines don't merge into one
            # DD "application". Activated via ddtrace-run (Dockerfile CMD); the
            # actual span is emitted by bot/llm_clients.py's query_ollama_api.
            - {name: DD_LLMOBS_ENABLED, value: "true"}
            - {name: DD_LLMOBS_ML_APP, value: grugthink-chat}
            # Task-relay-to-Hermes feature (bot/task_relay.py, bot/review_relay.py):
            # fail-closed/fail-safe by design, so an empty value here means the
            # feature stays off, not "open to everyone". Set
            # TASK_RELAY_ALLOWED_USER_IDS to a comma-separated list of Discord
            # user IDs before anyone can trigger a relay to Hermes at all.
            # HERMES_BOT_USER_ID is Hermes' own Discord user (not a repo
            # channel ID) - without it Grug will relay a request but never
            # trust any reply as genuinely coming from Hermes.
            - {name: TASK_RELAY_ALLOWED_USER_IDS, value: ""}
            - {name: HERMES_BOT_USER_ID, value: ""}
          envFrom:
            # SESSION_SECRET, generated in-cluster by the deploy step.
            - secretRef: {name: grugthink-secrets}
            # GRUGTHINK_DATABASE_URL -> Grug's long-term memory on Postgres+
            # pgvector (grugthink_facts) in the shared CNPG cluster, replacing the
            # node-pinned SQLite+FAISS PVC (#599, docs/pgvector-memory.md). The
            # secret is created out-of-band from SSM /githumps/grugthink/database_url
            # (grugthink role, infra cnpg-cluster tenant). Its presence flips
            # make_server_manager() to the pgvector backend.
            - secretRef: {name: grugthink-db}
            # POOLSIDE_API_KEY / OPENROUTER_API_KEY - bounded chat fallback
            # (see the env comment above). Resolved from SSM
            # /infra/llm/{poolside,openrouter}_api_key at DEPLOY time by the
            # grugthink.deploy.yml workflow's own OIDC session and injected
            # here as plain literals - this pod has no runtime AWS
            # credential path of its own (automountServiceAccountToken is
            # false below), unlike grug's webhook/consumer pods which read
            # GRUG_*_API_KEY_SSM env-var-held parameter NAMES via their own
            # Roles Anywhere identity. Refreshed on every deploy (unlike
            # SESSION_SECRET's create-once), so an SSM key rotation reaches
            # the pod on the next redeploy. optional:true (CodeRabbit #630):
            # this is a last-resort fallback tier, not needed by the primary
            # Ollama/Cave chat path - a missing Secret (first deploy before
            # the seed step ever ran, or a manually deleted Secret) must not
            # block the whole pod from starting.
            - secretRef: {name: grugthink-llm-fallback, optional: true}
            # GRUGTHINK_GITHUB_CHECKS_TOKEN - read-only "checks:read" PAT for
            # bot/review_relay.py to fetch the real Grug - Elder check-run
            # result. Deliberately its own token, not Hermes' broader
            # GH_TOKEN: this module only ever reads check-run output, never
            # writes anything. Provisioned out-of-band from SSM
            # /githumps/grugthink/github_checks_token, same pattern as
            # grugthink-db above. optional:true - a missing token degrades to
            # "Grug can't answer that yet" (fetch_elder_verdict returns None),
            # it must not block the whole pod from starting.
            - secretRef: {name: grugthink-github, optional: true}
          readinessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
            # With the default 1s timeout, transient event-loop stalls made
            # probes time out; after failureThreshold (3) consecutive failures
            # the kubelet restarts the container. 5s tolerates brief stalls
            # while 3x30s periods still catch a truly wedged process in ~2min.
            timeoutSeconds: 5
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            readOnlyRootFilesystem: true
          volumeMounts:
            - {name: data, mountPath: /data}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: grugthink-data}
        - name: tmp
          emptyDir: {sizeLimit: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: grugthink
  namespace: grugthink
  labels: {app: grugthink}
spec:
  selector: {app: grugthink}
  ports:
    - {name: http, port: 8080, targetPort: http}
