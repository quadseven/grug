<!DOCTYPE html>
<html>
<head>
    <title>Token Save Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-header">
                        <h3>🧪 Token Save Test</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Token Name</label>
                            <input type="text" class="form-control" id="test-token-name" placeholder="Test Token" value="Test Token">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Discord Token</label>
                            <input type="password" class="form-control" id="test-discord-token" placeholder="MTExMTE..." value="FAKE_TOKEN_FOR_TESTING_12345">
                        </div>
                        
                        <button id="test-save-btn" class="btn btn-success btn-lg w-100">
                            <i class="bi bi-plus-circle"></i> TEST SAVE TOKEN
                        </button>
                        
                        <div id="test-status" class="mt-3" style="display: none;"></div>
                        
                        <hr>
                        
                        <h5>Test Results:</h5>
                        <div id="test-results">
                            <div class="text-muted">Click the button above to test...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('🧪 TEST PAGE LOADED');
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ DOM Ready - Setting up test');
            
            const button = document.getElementById('test-save-btn');
            const results = document.getElementById('test-results');
            
            if (button) {
                console.log('✅ Found button, adding click listener');
                button.addEventListener('click', testTokenSave);
            } else {
                console.error('❌ Button not found!');
            }
        });
        
        async function testTokenSave() {
            console.log('🔥 TEST BUTTON CLICKED!');
            
            const nameInput = document.getElementById('test-token-name');
            const tokenInput = document.getElementById('test-discord-token');
            const statusDiv = document.getElementById('test-status');
            const button = document.getElementById('test-save-btn');
            const results = document.getElementById('test-results');
            
            const name = nameInput.value.trim();
            const token = tokenInput.value.trim();
            
            console.log('Test name:', name);
            console.log('Test token length:', token.length);
            
            // Show loading
            button.disabled = true;
            button.innerHTML = '<i class="bi bi-hourglass-split"></i> Testing...';
            showStatus(statusDiv, 'Testing API call...', 'info');
            
            try {
                console.log('Making test API request...');
                
                const response = await fetch('/api/discord-tokens', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: name, token: token })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    result = { error: 'Invalid JSON: ' + responseText };
                }
                
                console.log('Parsed result:', result);
                
                // Show detailed results
                results.innerHTML = `
                    <div class="alert alert-info">
                        <strong>API Response Details:</strong><br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(result, null, 2)}</pre>
                    </div>
                `;
                
                if (response.ok && result.status === 'success') {
                    showStatus(statusDiv, '✅ TEST PASSED - Token API works!', 'success');
                } else {
                    showStatus(statusDiv, '❌ API Error: ' + JSON.stringify(result), 'danger');
                }
                
            } catch (error) {
                console.error('Test error:', error);
                showStatus(statusDiv, '❌ Network Error: ' + error.message, 'danger');
                results.innerHTML = `<div class="alert alert-danger">Network Error: ${error.message}</div>`;
            } finally {
                button.disabled = false;
                button.innerHTML = '<i class="bi bi-plus-circle"></i> TEST SAVE TOKEN';
            }
        }
        
        function showStatus(statusDiv, message, type) {
            statusDiv.className = `alert alert-${type}`;
            statusDiv.innerHTML = message;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
