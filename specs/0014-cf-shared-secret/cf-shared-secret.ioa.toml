# spec 0014 — CfSharedSecret I/O Automaton
#
# Encodes the CF→AWS auth-boundary contract that pairs the CF Worker
# header injection (infra/cloudflare/workers/) with the Lambda-side
# middleware (services/{api,webhook}/cf_auth.py). The contract prevents
# direct hits on Lambda Function URLs from bypassing Cloudflare entirely.
#
# Five contract bools attest distinct invariants:
#   - The Pulumi-managed SSM SecureString exists at /grug/cf-shared-secret
#     (sourced from random.RandomPassword, not a literal in config).
#   - Both CF Workers inject the header from a Worker secret binding
#     (not an inlined string in worker.js).
#   - Both Lambda services register the CfAuthMiddleware on app startup.
#   - The middleware sources its secret from SSM via env var (not from
#     env literal, not hardcoded) — survives a rotation.
#   - The middleware exempts /livez and uses constant-time compare.
#
# Verified by `temper verify -s specs/0014-cf-shared-secret/`.

[automaton]
name = "CfSharedSecret"
states = ["NotProvisioned", "Attested", "Live"]
initial = "NotProvisioned"

# --- Pulumi-side contract bools ---

[[state]]
name = "shared_secret_provisioned_in_pulumi_per_iac_invariant"
type = "bool"
initial = "false"

# --- CF Worker side contract bools ---

[[state]]
name = "workers_inject_header_from_secret_binding_per_auth_boundary_contract"
type = "bool"
initial = "false"

# --- Lambda middleware side contract bools ---

[[state]]
name = "middleware_registered_in_both_services_per_auth_boundary_contract"
type = "bool"
initial = "false"

[[state]]
name = "middleware_secret_sourced_from_ssm_per_secret_handling_invariant"
type = "bool"
initial = "false"

[[state]]
name = "middleware_exempts_livez_and_uses_constant_time_compare_per_security_invariant"
type = "bool"
initial = "false"

[[action]]
name = "AttestPulumiProvisioning"
kind = "input"
from = ["NotProvisioned"]
params = ["attestor"]
guard = "is_false shared_secret_provisioned_in_pulumi_per_iac_invariant"
effect = [
  { type = "set_bool", var = "shared_secret_provisioned_in_pulumi_per_iac_invariant", value = true },
]
hint = "infra/pulumi/components/cf_shared_secret.py declares an aws.ssm.Parameter at /grug/cf-shared-secret backed by a random.RandomPassword (length=64, special=False). Pulumi `__main__.py` wires it into both Lambdas via extra_ssm_secrets (IAM grant) AND env var GRUG_CF_SHARED_SECRET_SSM. Exported as stack output cf_shared_secret_ssm_name."

[[action]]
name = "AttestWorkerInjection"
kind = "input"
from = ["NotProvisioned"]
params = ["attestor"]
guard = "is_false workers_inject_header_from_secret_binding_per_auth_boundary_contract"
effect = [
  { type = "set_bool", var = "workers_inject_header_from_secret_binding_per_auth_boundary_contract", value = true },
]
hint = "Both infra/cloudflare/workers/grug-{api,webhook}-host-rewrite/worker.js read env[BINDING_NAME] (the GRUG_CF_SECRET Worker secret binding) and set the X-Grug-CF-Secret header on the upstream request using headers.set (overwrite, not append). infra/cloudflare/deploy.sh PUTs the binding value from SSM /grug/cf-shared-secret as the GRUG_CF_SECRET secret binding on each Worker script."

[[action]]
name = "AttestMiddlewareRegistered"
kind = "input"
from = ["NotProvisioned"]
params = ["attestor"]
guard = "is_false middleware_registered_in_both_services_per_auth_boundary_contract"
effect = [
  { type = "set_bool", var = "middleware_registered_in_both_services_per_auth_boundary_contract", value = true },
]
hint = "Both services/{api,webhook}/main.py import CfAuthMiddleware from cf_auth and call app.add_middleware(CfAuthMiddleware). Middleware module cf_auth.py is mirrored byte-identical (modulo MIRRORED header) per ADR-0001, gated by drift-lint."

[[action]]
name = "AttestMiddlewareSecretSourcedFromSsm"
kind = "input"
from = ["NotProvisioned"]
params = ["attestor"]
guard = "is_false middleware_secret_sourced_from_ssm_per_secret_handling_invariant"
effect = [
  { type = "set_bool", var = "middleware_secret_sourced_from_ssm_per_secret_handling_invariant", value = true },
]
hint = "cf_auth.py's _default_secret_loader reads `GRUG_CF_SHARED_SECRET_SSM` env var and calls boto3 ssm.get_parameter(WithDecryption=True). No literal secret values anywhere in cf_auth.py. Survives rotation via Pulumi-bumped keepers + re-run of deploy.sh."

[[action]]
name = "AttestMiddlewareBehavior"
kind = "input"
from = ["NotProvisioned"]
params = ["attestor"]
guard = "is_false middleware_exempts_livez_and_uses_constant_time_compare_per_security_invariant"
effect = [
  { type = "set_bool", var = "middleware_exempts_livez_and_uses_constant_time_compare_per_security_invariant", value = true },
]
hint = "cf_auth.py: /livez always passes (DD synthetics + smoke tests). Header comparison uses hmac.compare_digest (constant-time). Fail-open on unconfigured env var, empty SSM value, or SSM lookup failure — logged but permissive so deploy ordering across Pulumi + Workers + service can race without breaking production."

[[action]]
name = "Attested"
kind = "input"
from = ["NotProvisioned"]
to = "Attested"
params = ["commit_sha"]
guard = [
  { type = "is_true", var = "shared_secret_provisioned_in_pulumi_per_iac_invariant" },
  { type = "is_true", var = "workers_inject_header_from_secret_binding_per_auth_boundary_contract" },
  { type = "is_true", var = "middleware_registered_in_both_services_per_auth_boundary_contract" },
  { type = "is_true", var = "middleware_secret_sourced_from_ssm_per_secret_handling_invariant" },
  { type = "is_true", var = "middleware_exempts_livez_and_uses_constant_time_compare_per_security_invariant" },
]
hint = "All five contract bools attested. Code + IaC are coherent — but the boundary is not yet enforced because the operator hasn't run `pulumi up` + `infra/cloudflare/deploy.sh` yet."

[[action]]
name = "Deploy"
kind = "input"
from = ["Attested"]
to = "Live"
params = ["commit_sha"]
hint = "Operator runs `pulumi up` (creates SSM secret + grants IAM + injects env var) then `infra/cloudflare/deploy.sh` (pushes workers + sets GRUG_CF_SECRET binding). Next Lambda cold start picks up the SSM value via _default_secret_loader; middleware flips into strict mode. Live audit: direct Function URL hit → 401, via-CF → 200."

[[invariant]]
name = "MustAttestBeforeDeploy"
assert = "ordering(NotProvisioned, Attested)"

[[invariant]]
name = "MustDeployBeforeLive"
assert = "ordering(Attested, Live)"
