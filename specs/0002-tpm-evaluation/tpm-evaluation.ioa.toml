# spec 0002 — TpmEvaluation I/O Automaton
#
# Models the aggregate result of running the 5 DoR checks against one
# PR. `TpmEvaluation` is a frozen dataclass returned by
# `evaluate_pull_request(...)` in
# `services/{api,webhook}/personas/tpm/persona.py`; it composes into a
# `CheckRunResult` (spec 0001) for GitHub.
#
# Source of truth: DESIGN.md § "Process-gate concepts".
#
# Verified by `temper verify -s specs/0002-tpm-evaluation/`.

[automaton]
name = "TpmEvaluation"
states = ["Drafted", "Evaluated", "Composed", "Retired"]
initial = "Drafted"

# --- Evaluation contract bools ---

[[state]]
name = "all_five_dor_checks_executed_per_process_gate_concepts"
type = "bool"
initial = "false"

[[state]]
name = "aggregate_passed_iff_all_five_passed_per_process_gate_concepts"
type = "bool"
initial = "false"

[[state]]
name = "evaluate_pull_request_is_pure_function_per_process_gate_concepts"
type = "bool"
initial = "false"

# --- Compose contract bools (composes into a CheckRunResult) ---

[[state]]
name = "frozen_dataclass_no_post_construction_mutation_per_process_gate_concepts"
type = "bool"
initial = "false"

[[state]]
name = "composes_into_check_run_result_per_process_gate_concepts"
type = "bool"
initial = "false"

# --- Scope-review advisory contract bools ---

[[state]]
name = "scope_review_is_advisory_only_does_not_block_per_process_gate_concepts"
type = "bool"
initial = "false"

[[state]]
name = "scope_review_absence_does_not_change_aggregate_passed_per_process_gate_concepts"
type = "bool"
initial = "false"

[[action]]
name = "AttestEvaluationContract"
kind = "input"
from = ["Drafted"]
params = ["attestor"]
guard = "is_false evaluate_pull_request_is_pure_function_per_process_gate_concepts"
effect = [
  { type = "set_bool", var = "all_five_dor_checks_executed_per_process_gate_concepts", value = true },
  { type = "set_bool", var = "aggregate_passed_iff_all_five_passed_per_process_gate_concepts", value = true },
  { type = "set_bool", var = "evaluate_pull_request_is_pure_function_per_process_gate_concepts", value = true },
]
hint = "All 5 DoR rules ran; aggregate pass requires every rule pass; function is pure (no IO during evaluation)."

[[action]]
name = "AttestComposeContract"
kind = "input"
from = ["Drafted"]
params = ["attestor"]
guard = "is_false composes_into_check_run_result_per_process_gate_concepts"
effect = [
  { type = "set_bool", var = "frozen_dataclass_no_post_construction_mutation_per_process_gate_concepts", value = true },
  { type = "set_bool", var = "composes_into_check_run_result_per_process_gate_concepts", value = true },
]
hint = "Frozen dataclass; composes 1:1 into CheckRunResult (spec 0001)."

[[action]]
name = "AttestScopeReviewAdvisoryContract"
kind = "input"
from = ["Drafted"]
params = ["attestor"]
guard = "is_false scope_review_absence_does_not_change_aggregate_passed_per_process_gate_concepts"
effect = [
  { type = "set_bool", var = "scope_review_is_advisory_only_does_not_block_per_process_gate_concepts", value = true },
  { type = "set_bool", var = "scope_review_absence_does_not_change_aggregate_passed_per_process_gate_concepts", value = true },
]
hint = "Scope review (roadmap, see persona/__init__.py) is advisory comment only; never flips aggregate_passed."

[[action]]
name = "Evaluate"
kind = "input"
from = ["Drafted"]
to = "Evaluated"
params = ["pr_number"]
guard = [
  { type = "is_true", var = "all_five_dor_checks_executed_per_process_gate_concepts" },
  { type = "is_true", var = "aggregate_passed_iff_all_five_passed_per_process_gate_concepts" },
  { type = "is_true", var = "evaluate_pull_request_is_pure_function_per_process_gate_concepts" },
  { type = "is_true", var = "scope_review_is_advisory_only_does_not_block_per_process_gate_concepts" },
  { type = "is_true", var = "scope_review_absence_does_not_change_aggregate_passed_per_process_gate_concepts" },
]
hint = "evaluate_pull_request runs and produces an aggregate verdict."

[[action]]
name = "Compose"
kind = "input"
from = ["Evaluated"]
to = "Composed"
params = ["compose_id"]
guard = [
  { type = "is_true", var = "frozen_dataclass_no_post_construction_mutation_per_process_gate_concepts" },
  { type = "is_true", var = "composes_into_check_run_result_per_process_gate_concepts" },
]
hint = "Hands the verdict to github_checks_client.post_check_run via a CheckRunResult."

[[action]]
name = "Retire"
kind = "input"
from = ["Composed"]
to = "Retired"
params = ["successor_pr_head_sha"]
hint = "PR head moves; this evaluation is now historical."

[[invariant]]
name = "MustEvaluateBeforeCompose"
assert = "ordering(Evaluated, Composed)"

[[invariant]]
name = "MustComposeBeforeRetire"
assert = "ordering(Composed, Retired)"

[[invariant]]
name = "RetiredIsTerminal"
when = ["Retired"]
assert = "no_further_transitions"
