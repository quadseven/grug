name: IaC · Pulumi deploy (grug)

# Deploys grug SaaS infra to AWS via OIDC (no long-lived creds).
#   - push main / tag v*  → pulumi up + CF Workers + smoke (PRs: meta only)
# The Lambda image build lanes retired with the #354 k8s cutover - app
# images now build+deploy via deploy.k8s.yml (in-cluster registry).

on:
  push:
    branches:
      - main
      - 'feat/22-*'
      - 'feat/23-*'
      - 'feat/24-*'
      - 'feat/25-*'
      - 'feat/26-*'
      - 'feat/27-*'
      - 'feat/28-*'
      - 'feat/29-*'
      - 'feat/30-*'
      - 'feat/31-*'
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: iac-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - id: t
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

  # Pure unit tests for the infra components (monitor query builders, the
  # notify_no_data policy). Runs on PRs - the only pre-merge gate for
  # infra/pulumi changes (pulumi-up is merge-only), so a regression that
  # re-introduces a retired aws.lambda/aws.sqs query or flips a continuous-KSM
  # monitor back to notify_no_data=False is caught before merge.
  infra-test:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 01. Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 02. Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: 03. Infra unit tests
        working-directory: infra/pulumi
        run: uv run --with pytest pytest tests/ -q

  pulumi-up:
    needs: meta
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 01. Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 02. Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/grug-gha-deploy
          aws-region: us-east-1
      - name: 03. Stack name
        id: stack
        run: echo "stack=prod" >> "$GITHUB_OUTPUT"
      - name: 04. Pulumi login (S3 backend)
        env:
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
        run: pulumi login "$PULUMI_BACKEND_URL"
      - name: 05a. Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: 05b. Verify Python + uv
        run: |
          python3 --version
          uv --version
      - name: 10. Pulumi up
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6.6.1
        with:
          command: up
          stack-name: ${{ steps.stack.outputs.stack }}
          cloud-url: ${{ secrets.PULUMI_BACKEND_URL }}
          work-dir: infra/pulumi
          config-map: |
            # FROZEN at the last pre-swap SHA (#354 store swap): the source
            # tree is Postgres-only from the swap commit on, and the Lambdas
            # have no database URL or network path to the cluster store -
            # deploying a post-swap image here is an instant outage on live
            # traffic. Builds still push per-SHA images; the Lambdas just
            # never advance past this tag. Do NOT unfreeze: the Lambdas
            # retire at cutover (retirement PR removes this whole pipeline).
      - name: 11. Deploy CF Workers
        run: bash infra/cloudflare/deploy.sh
        env:
          PULUMI_CWD: infra/pulumi

  # Public-endpoint smoke test, migrated to the shared reusable so the
  # curl-retry + status-assert pattern lives in one place (githumps/infra-public
  # #24, githumps/infrastructure#840). SHA-pinned to the reusable PR branch tip;
  # repins to the merge commit once that PR lands.
  smoke:
    needs: pulumi-up
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    uses: githumps/infra-public/.github/workflows/_reusable.smoke-test.yml@91c46ceed4656a992e9143fbe29cc52744c9f524
    with:
      retries: 3
      retry-delay: 5
      timeout: 30
      endpoints: |
        [
          {"name": "api /livez", "url": "https://api.grug.lol/livez", "expect-status": "200"},
          {"name": "webhook /livez", "url": "https://webhook.grug.lol/livez", "expect-status": "200"},
          {"name": "webhook unsigned POST", "url": "https://webhook.grug.lol/webhook/github", "expect-status": "401", "method": "POST", "headers": ["Content-Type: application/json", "X-GitHub-Event: ping"], "body": "{\"zen\":\"smoke\"}"}
        ]
