# PR preview environments (#500, ADR-0018): namespace-per-PR from the
# pr-<n> digest #498 already pushes. OPT-IN via the `preview` label.
# Isolated: own namespace + own Postgres SCHEMA + throwaway secret + a
# FAKE webhook secret (never prod GitHub App creds). Reaped on
# unlabel/close (here) and by the TTL janitor CronJob (k8s/preview-janitor).
name: preview

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, closed]

permissions:
  contents: read
  # Both deploy and teardown assume grug-gha-deploy via GitHub OIDC
  # (aws-actions/configure-aws-credentials) - without this, the action
  # fails "Credentials could not be loaded, please check your action
  # inputs: Could not load credentials from any providers" because no
  # OIDC token can be minted at all. This was a second, independent bug
  # from the environment/branch-policy one (infra#943-adjacent fix) -
  # always present, just invisible because the environment rejection
  # always failed first. Matches deploy.k8s.yml's existing permissions.
  id-token: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  deploy:
    # Deploy/refresh while the `preview` label is present and the PR is
    # open. Same-repo only: a fork PR has no access to the environment
    # secrets by GitHub's rules, and a preview must not run fork code with
    # cluster credentials.
    if: >-
      github.event.pull_request.state == 'open' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    # NOT k8s-prod (#943-adjacent fix): GitHub evaluates an Environment's
    # deployment-branch-policy against refs/pull/N/merge for a
    # pull_request-triggered job, which can NEVER match a branch-name
    # policy like k8s-prod's "main only" - this job was structurally
    # incapable of ever succeeding. k8s-preview is a dedicated environment
    # with NO branch policy, holding its own copy of the same 5 secrets
    # (a fresh, minimally-scoped ServiceAccount for KUBECONFIG_B64, not a
    # copy of the cluster-admin-bound prod credential) plus a matching
    # OIDC trust-policy entry (infra/pulumi/__main__.py, environments=).
    environment: k8s-preview
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci
          use-cache: 'true'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100 # v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/grug-gha-deploy
          aws-region: us-east-1
      - name: Write kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          install -m 700 -d "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Registry login
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" --username "$REGISTRY_USERNAME" --password-stdin
      - name: Deploy preview
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # $PR is github.event.pull_request.number (a trusted positive
          # int); guard anyway before it reaches a namespace/schema name.
          case "$PR" in ''|*[!0-9]*) echo "::error::PR number not numeric"; exit 1;; esac
          NS="grug-pr-${PR}"; SCHEMA="grug_pr_${PR}"
          # Require the #498 pr-tagged images and PIN BY DIGEST (tags are
          # mutable - Qodo review; deploy the exact tested manifest like
          # #498 does on merge).
          DIG_W=$(docker buildx imagetools inspect "$REGISTRY_HOST/grug-webhook:pr-${PR}" --format '{{.Manifest.Digest}}' 2>/dev/null || echo "")
          DIG_A=$(docker buildx imagetools inspect "$REGISTRY_HOST/grug-api:pr-${PR}" --format '{{.Manifest.Digest}}' 2>/dev/null || echo "")
          if [ -z "$DIG_W" ] || [ -z "$DIG_A" ]; then
            echo "::error::no pr-${PR} image digest for a service - the #498 gate must push it first"; exit 1
          fi
          # Throwaway Postgres SCHEMA in the shared CNPG DB (drop+create =
          # clean slate each refresh). The app bootstraps grug_kv into it
          # via search_path. Secret piped to python via stdin (never argv
          # or a shell var) - the same discipline the deploy uses.
          BASE_URL=$(aws ssm get-parameter --name /grug/database-url --with-decryption --query Parameter.Value --output text)
          # See the teardown step's note: the DB host is cluster-internal DNS,
          # unresolvable from this hosted runner, so tunnel via port-forward and
          # override host/port (the runtime PREVIEW_DB_URL below keeps the real
          # cluster host - the in-cluster preview pods resolve it fine; only the
          # CI-side schema reset needs the tunnel).
          kubectl -n databases port-forward svc/postgres-rw 25432:5432 >/tmp/grug-db-pf.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do grep -q "Forwarding from" /tmp/grug-db-pf.log && break; sleep 1; done
          grep -q "Forwarding from" /tmp/grug-db-pf.log \
            || { echo "::error::port-forward to postgres-rw did not establish"; cat /tmp/grug-db-pf.log; exit 1; }
          printf '%s' "$BASE_URL" | SCHEMA="$SCHEMA" LPORT=25432 uv run --with 'psycopg[binary]' python3 -c '
          import os, sys, psycopg
          url = sys.stdin.read().strip(); schema = os.environ["SCHEMA"]; lport = int(os.environ["LPORT"])
          with psycopg.connect(url, host="127.0.0.1", port=lport, sslmode="require", autocommit=True) as c:
              c.execute(f"DROP SCHEMA IF EXISTS \"{schema}\" CASCADE")
              c.execute(f"CREATE SCHEMA \"{schema}\"")
          print("schema reset:", schema)'
          PREVIEW_DB_URL="${BASE_URL}?options=-csearch_path%3D${SCHEMA}"
          FAKE_WH=$(head -c 32 /dev/urandom | base64 | tr -d '/+=')
          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
          # Preview secret: schema-scoped DB URL + a FAKE webhook secret.
          # No prod GitHub App creds ever enter a preview.
          kubectl -n "$NS" delete secret grug-preview-secret --ignore-not-found
          printf 'GRUG_DATABASE_URL=%s\nGRUG_PREVIEW_WEBHOOK_SECRET=%s\n' "$PREVIEW_DB_URL" "$FAKE_WH" > "$RUNNER_TEMP/preview.env"
          kubectl -n "$NS" create secret generic grug-preview-secret --from-env-file="$RUNNER_TEMP/preview.env"
          rm -f "$RUNNER_TEMP/preview.env"
          kubectl -n "$NS" create secret docker-registry registry-pull \
            --docker-server="$REGISTRY_HOST" --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_PASSWORD" --dry-run=client -o yaml | kubectl apply -f -
          sed -e "s|PREVIEW_NS|${NS}|g" -e "s|PREVIEW_PR|${PR}|g" \
              -e "s|PREVIEW_IMAGE_WEBHOOK|${REGISTRY_HOST}/grug-webhook@${DIG_W}|g" \
              -e "s|PREVIEW_IMAGE_API|${REGISTRY_HOST}/grug-api@${DIG_A}|g" \
              k8s/preview/namespace.yaml k8s/preview/deployments.yaml | kubectl apply -f -
          kubectl -n "$NS" rollout status deploy/grug-webhook --timeout=180s
          kubectl -n "$NS" rollout status deploy/grug-api --timeout=180s
          echo "Preview **${NS}** up: both services on pr-${PR}, schema ${SCHEMA}, NO prod secrets, resource-capped. Reaped on close/unlabel or after 48h." >> "$GITHUB_STEP_SUMMARY"
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

  teardown:
    # Reap when the PR closes/merges, or the `preview` label is removed.
    # Same-repo guard for consistency/defense-in-depth with deploy (CodeRabbit
    # PR #571) - low risk either way since GitHub already withholds repo
    # secrets from fork-triggered pull_request runs by default, but this
    # removes any doubt.
    if: >-
      (github.event.action == 'closed' ||
       (github.event.action == 'unlabeled' && github.event.label.name == 'preview')) &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    # NOT k8s-prod - see the deploy job's comment above; a pull_request-
    # triggered job can never satisfy a branch-name deployment policy.
    environment: k8s-preview
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci
          use-cache: 'true'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100 # v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/grug-gha-deploy
          aws-region: us-east-1
      - name: Write kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          install -m 700 -d "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Reap preview namespace + schema
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # $PR is github.event.pull_request.number (a trusted positive
          # int); guard anyway before it reaches a namespace/schema name.
          case "$PR" in ''|*[!0-9]*) echo "::error::PR number not numeric"; exit 1;; esac
          NS="grug-pr-${PR}"; SCHEMA="grug_pr_${PR}"
          kubectl delete namespace "$NS" --ignore-not-found --wait=false
          BASE_URL=$(aws ssm get-parameter --name /grug/database-url --with-decryption --query Parameter.Value --output text)
          # /grug/database-url points at postgres-rw.databases.svc.cluster.local
          # - CLUSTER-INTERNAL DNS, unresolvable from this GitHub-hosted runner
          # (chronic teardown failures since grug's DB moved to in-cluster CNPG:
          # `[Errno -3] Temporary failure in name resolution`). exec/logs are
          # dead on this BYON node (apiserver can't reach kubelet:10250), but
          # port-forward works, so tunnel to the DB and connect over localhost,
          # overriding only host/port (keep the URL's creds/dbname). Proven live
          # 2026-07-18: tunnel up -> SELECT 1 -> 1.
          kubectl -n databases port-forward svc/postgres-rw 25432:5432 >/tmp/grug-db-pf.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do grep -q "Forwarding from" /tmp/grug-db-pf.log && break; sleep 1; done
          grep -q "Forwarding from" /tmp/grug-db-pf.log \
            || { echo "::error::port-forward to postgres-rw did not establish"; cat /tmp/grug-db-pf.log; exit 1; }
          printf '%s' "$BASE_URL" | SCHEMA="$SCHEMA" LPORT=25432 uv run --with 'psycopg[binary]' python3 -c '
          import os, sys, psycopg
          # host/port overridden to the local tunnel; sslmode=require encrypts
          # without cert-hostname verification (the endpoint is 127.0.0.1, the
          # cert names the service). Pre-extracting `schema` keeps the f-string
          # expression quote-free (a backslash-escaped quote inside an f-string
          # EXPRESSION is a SyntaxError - the 2026-07-14 teardown bug).
          url = sys.stdin.read().strip(); schema = os.environ["SCHEMA"]; lport = int(os.environ["LPORT"])
          with psycopg.connect(url, host="127.0.0.1", port=lport, sslmode="require", autocommit=True) as c:
              c.execute(f"DROP SCHEMA IF EXISTS \"{schema}\" CASCADE")
          print("dropped schema", schema)'
          echo "reaped preview for PR ${PR}" >> "$GITHUB_STEP_SUMMARY"
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"
