name: Web · Cloudflare Pages deploy

on:
  # No `paths` filter — Greptile P2 on PR #42 noted that `paths` under
  # `push` applies to tags too, silently suppressing v* tag deploys
  # when the tag commit doesn't touch web/**. Web build is ~3min and
  # cheap; let every relevant push deploy.
  push:
    branches:
      - main
      - 'feat/27-*'
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        default: ""

concurrency:
  group: web-deploy-${{ github.ref }}
  # Deploys serialize, never cancel — partially-deployed Cloudflare
  # Pages state is worse than queued runs. Closes #63.
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

# Force JS actions to Node 24. See iac.deploy.yml. Closes #71.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    # Public repo → GitHub-hosted ubuntu-latest is free + unmetered + no
    # nightly auto-reboot interruption risk. Swapped from a self-hosted
    # runner 2026-05-24.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 01. Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 02. Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: 03. Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/grug-gha-deploy
          aws-region: us-east-1

      - name: 04. Resolve secrets from SSM
        id: secrets
        env:
          AWS_REGION: us-east-1
        run: |
          set -euo pipefail
          # OIDC must be configured BEFORE this step. Earlier ordering
          # called aws sts/ssm before configure-creds and failed on
          # fresh self-hosted runners with no ambient AWS creds. Codex
          # P1 + Greptile P1 on PR #42.
          aws sts get-caller-identity > /dev/null
          CF_API_TOKEN=$(aws ssm get-parameter \
            --name /grug/cloudflare-api-token --with-decryption \
            --query 'Parameter.Value' --output text)
          CF_ACCOUNT_ID=$(aws ssm get-parameter \
            --name /grug/cloudflare-account-id \
            --query 'Parameter.Value' --output text)
          echo "::add-mask::$CF_API_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CF_API_TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT_ID" >> "$GITHUB_ENV"

          # DD RUM credentials (spec 0013). Both are public-by-design
          # (they live in the browser bundle) but sourced from SSM so a
          # rotation is `pulumi up`, not a git commit. Pulumi component
          # dd_rum.py owns the SSM values. If missing, the build still
          # succeeds — the RUM init checks for placeholders and no-ops.
          DD_RUM_APP_ID=$(aws ssm get-parameter \
            --name /grug/dd-rum-application-id --with-decryption \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          DD_RUM_TOKEN=$(aws ssm get-parameter \
            --name /grug/dd-rum-client-token --with-decryption \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          # Mask both — they're not high-sensitivity but masking
          # prevents accidental log leaks.
          [ -n "$DD_RUM_APP_ID" ] && echo "::add-mask::$DD_RUM_APP_ID"
          [ -n "$DD_RUM_TOKEN" ] && echo "::add-mask::$DD_RUM_TOKEN"
          echo "DD_RUM_APP_ID=$DD_RUM_APP_ID" >> "$GITHUB_ENV"
          echo "DD_RUM_TOKEN=$DD_RUM_TOKEN" >> "$GITHUB_ENV"

      - name: 05. Install deps
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: 06. Type check
        working-directory: web
        run: npm run typecheck

      # Vite build consumes VITE_DD_RUM_* env vars and inlines them into
      # the SPA bundle via web/src/rum.ts (spec 0013). Resolve the deploy
      # env from the branch: `main` and tags = prod, anything else = dev.
      - name: 07. Build
        working-directory: web
        env:
          VITE_DD_RUM_APPLICATION_ID: ${{ env.DD_RUM_APP_ID }}
          VITE_DD_RUM_CLIENT_TOKEN: ${{ env.DD_RUM_TOKEN }}
          VITE_DD_RUM_ENV: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'dev' }}
          VITE_DD_RUM_VERSION: ${{ github.sha }}
        run: npm run build

      # Substitute the same RUM credentials into the static HTML files
      # in dist/ (index.html, Privacy.html, Terms.html — the landing +
      # docs that don't go through Vite's HTML bundling). Spec 0013 bool
      # `rum_sdk_loaded_on_static_landing_entries_per_observability_intent`.
      # No-op when DD_RUM_APP_ID is empty so local-preview builds work
      # without breaking the deploy.
      - name: 07b. Inject DD RUM credentials into static HTML
        if: env.DD_RUM_APP_ID != ''
        working-directory: web/dist
        env:
          DD_RUM_ENV: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'dev' }}
        run: |
          set -euo pipefail
          for html in index.html Privacy.html Terms.html; do
            if [ ! -f "$html" ]; then
              echo "::warning::$html missing from dist/ — skipping RUM substitution"
              continue
            fi
            # `|` as sed delimiter so application-id values containing `/`
            # don't break the regex. -i.bak for macOS portability; .bak
            # files removed below.
            sed -i.bak \
              -e "s|__DD_RUM_APPLICATION_ID__|${DD_RUM_APP_ID}|g" \
              -e "s|__DD_RUM_CLIENT_TOKEN__|${DD_RUM_TOKEN}|g" \
              -e "s|__DD_RUM_ENV__|${DD_RUM_ENV}|g" \
              -e "s|__DD_RUM_VERSION__|${GITHUB_SHA}|g" \
              "$html"
            rm -f "$html.bak"
            # Sanity check — fail loudly if any placeholder survived.
            if grep -q '__DD_RUM_' "$html"; then
              echo "::error::placeholder substitution incomplete in $html"
              grep -n '__DD_RUM_' "$html" | head -5
              exit 1
            fi
          done
          echo "✓ DD RUM credentials substituted into 3 static HTML files"

      - name: 08. Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@3 pages deploy dist \
            --project-name grug-web \
            --branch "${GITHUB_REF_NAME}" \
            --commit-hash "${GITHUB_SHA}"

      # Purge CF edge cache so the new build is visible immediately, even
      # if a path-rule somewhere keeps an HTML response cached. Asset
      # files are content-hashed and unaffected by purge.
      #
      # Token must include `Zone:Cache Purge` scope. If purge returns 403
      # (Authentication error), the operator needs to add the scope to
      # `/grug/cloudflare-api-token` via the CF dashboard one-shot:
      #   dashboard.cloudflare.com → My Profile → API Tokens →
      #   edit the grug deploy token → add Zone:Cache Purge → save.
      # The token VALUE doesn't change; no SSM update needed.
      - name: 09. Purge Cloudflare cache
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          CF_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          ZONE_ID=$(aws ssm get-parameter \
            --name /grug/cloudflare-zone-id \
            --query 'Parameter.Value' --output text)
          response=$(curl --silent --show-error --connect-timeout 10 --max-time 15 \
            -w "\n%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          status=$(tail -n1 <<<"$response")
          body=$(sed '$d' <<<"$response")
          # Warn-only: HTML is already uncached by web/public/_headers
          # so a missing purge scope doesn't break the deploy. Surface
          # the actionable HITL clearly when the scope IS missing so
          # the operator can add it on their own schedule.
          if [ "$status" = "200" ]; then
            echo "✓ CF cache purged"
          elif [ "$status" = "401" ] || [ "$status" = "403" ]; then
            echo "::warning::CF cache purge returned HTTP $status — token missing Zone:Cache Purge scope. Add it at dashboard.cloudflare.com → My Profile → API Tokens → edit the grug deploy token → add Zone:Cache Purge → save. Token value does NOT change; no SSM update needed. Deploy continues — HTML is no-cache via web/public/_headers."
            echo "$body"
          else
            echo "::warning::CF cache purge returned HTTP $status — non-auth failure, deploy continues."
            echo "$body"
          fi

  # Production smoke test - only runs for prod-eligible refs (main +
  # version tags). Asserts the deploy actually took effect by checking
  # load-bearing strings in the landing page response - catches the
  # "wrangler succeeded but CF cache served the previous build" failure
  # mode and any URL-canon drift. Migrated to the shared reusable so the
  # curl-retry + content-assert pattern lives in one place
  # (githumps/infra-public#24, githumps/infrastructure#840). The 30s
  # pre-delay covers Cloudflare Pages propagation. SHA-pinned to the
  # reusable PR branch tip; repins to the merge commit once that PR lands.
  smoke:
    needs: build-and-deploy
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    uses: githumps/infra-public/.github/workflows/_reusable.smoke-test.yml@91c46ceed4656a992e9143fbe29cc52744c9f524
    with:
      retries: 3
      retry-delay: 5
      timeout: 15
      pre-delay: 30
      user-agent: "grug-deploy-smoke/1.0"
      endpoints: |
        [
          {"name": "grug.lol signin link", "url": "https://grug.lol/", "expect-status": "200", "contains": "href=\"/signin\""},
          {"name": "grug.lol grug-tribe", "url": "https://grug.lol/", "expect-status": "200", "contains": "grug-tribe"}
        ]
