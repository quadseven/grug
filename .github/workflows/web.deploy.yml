name: Web · Cloudflare Pages deploy

on:
  push:
    branches:
      - main
      - 'feat/27-*'
    paths:
      - 'web/**'
      - '.github/workflows/web.deploy.yml'
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        default: ""

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64, srv-unraid-gha]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/grug-gha-deploy
          aws-region: us-east-1

      - name: Resolve secrets from SSM
        id: secrets
        env:
          AWS_REGION: us-east-1
        run: |
          set -euo pipefail
          # OIDC must be configured BEFORE this step — earlier ordering
          # called aws sts/ssm before configure-creds and failed on
          # fresh self-hosted runners with no ambient AWS creds. Codex
          # post-review #53.
          aws sts get-caller-identity > /dev/null
          CF_API_TOKEN=$(aws ssm get-parameter \
            --name /grug/cloudflare-api-token --with-decryption \
            --query 'Parameter.Value' --output text)
          CF_ACCOUNT_ID=$(aws ssm get-parameter \
            --name /grug/cloudflare-account-id \
            --query 'Parameter.Value' --output text)
          echo "::add-mask::$CF_API_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CF_API_TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT_ID" >> "$GITHUB_ENV"

      - name: Install deps
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Type check
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@3 pages deploy dist \
            --project-name grug-web \
            --branch "${GITHUB_REF_NAME}" \
            --commit-hash "${GITHUB_SHA}"
