name: Grug · Pulse (reusable)

# Scheduled iteration health summary. Caller workflow opens a daily /
# weekly summary issue with the output. Cross-repo callable.
#
# Consumer caller:
#
#   on:
#     schedule:
#       - cron: '0 13 * * 1'   # Monday 13:00 UTC weekly groom signal
#     workflow_dispatch:
#   jobs:
#     pulse:
#       uses: githumps/grug/.github/workflows/_reusable.grug-pulse.yml@main
#       with:
#         issue_label: "grug-pulse"   # findable later
#       secrets:
#         gh_token: ${{ secrets.GITHUB_TOKEN }}
#         poolside_api_key: ${{ secrets.POOLSIDE_API_KEY }}

on:
  workflow_call:
    inputs:
      issue_label:
        description: "Label applied to the auto-created pulse issue. Use a single label so it's filterable."
        required: false
        type: string
        default: "grug-pulse"
      mode:
        description: "Pulse mode: 'daily' (terse) or 'weekly' (full triage report). Caller sets via schedule cron."
        required: false
        type: string
        default: "weekly"
      label_stale:
        description: "If true, runs label-stale before the pulse summary — labels open issues quiet ≥ stale_days with stale_label."
        required: false
        type: boolean
        default: true
      stale_days:
        description: "Days of inactivity before an issue is considered stale."
        required: false
        type: number
        default: 90
      stale_label:
        description: "Label to apply to stale issues."
        required: false
        type: string
        default: "stale"
      stale_exempt_labels:
        description: "Comma-separated labels that exempt an issue from stale-labelling."
        required: false
        type: string
        default: "epic,pinned,security,grug-pulse"
      project_id:
        description: "Project v2 GraphQL node ID (e.g. PVT_kwHOA4Uvvc4A8kYP). Required for project auto-add. Find via `gh api graphql -f query='query{user(login:\"<owner>\"){projectV2(number:N){id}}}'`."
        required: false
        type: string
        default: ""
      project_status_field_id:
        description: "Optional. Project v2 single-select field ID for Status. If both this and project_status_option_id are set, the pulse issue is moved to that column after add."
        required: false
        type: string
        default: ""
      project_status_option_id:
        description: "Optional. Status option ID (e.g. the 'Triage' column). Paired with project_status_field_id."
        required: false
        type: string
        default: ""
    secrets:
      gh_token:
        required: false
      poolside_api_key:
        required: false
      project_pat:
        description: "Optional PAT with project:write scope. If set together with project_owner + project_number, auto-adds the pulse issue to that Project v2 board."
        required: false

permissions:
  contents: read
  issues: write
  # Pulse fetches open PRs to compute stuck-PR count; without this perm
  # `gh pr list` returns 0 results and the pulse silently misses PRs.
  pull-requests: read

jobs:
  grug-pulse:
    name: Grug — iteration pulse
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # DD MEDIUM: same `grug-bot` environment as the pr-gate job for
    # secret-scope parity.
    environment: grug-bot
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: githumps/grug
          ref: main
          path: grug

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - run: pip install --quiet "openai>=1.0,<2.0"

      - name: Label stale issues (subsumes actions/stale)
        if: ${{ inputs.label_stale }}
        env:
          GH_TOKEN: ${{ secrets.gh_token != '' && secrets.gh_token || secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          STALE_DAYS: ${{ inputs.stale_days }}
          STALE_LABEL: ${{ inputs.stale_label }}
          STALE_EXEMPT_LABELS: ${{ inputs.stale_exempt_labels }}
        run: |
          # Best-effort: never blocks pulse summary.
          set +e
          set -uo pipefail
          python grug/scripts/tpm.py label-stale \
            || echo "::warning::label-stale exited non-zero; pulse continues"

      - name: Compute pulse + open issue
        env:
          GH_TOKEN: ${{ secrets.gh_token != '' && secrets.gh_token || secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          POOLSIDE_API_KEY: ${{ secrets.poolside_api_key }}
          PULSE_LABEL: ${{ inputs.issue_label }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          PULSE_BODY=$(python grug/scripts/tpm.py pulse)
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Grug pulse · ${MODE} · ${DATE}"
          echo "$PULSE_BODY" > /tmp/pulse.md
          ISSUE_URL=$(gh issue create \
            --repo "$GH_REPOSITORY" \
            --title "$TITLE" \
            --body-file /tmp/pulse.md \
            --label "$PULSE_LABEL" 2>&1) \
            || { echo "::warning::Failed to create pulse issue: $ISSUE_URL"; exit 0; }
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_URL" > /tmp/issue_url.txt
        id: open_issue

      - name: Auto-add pulse issue to Project v2 (optional)
        env:
          GH_TOKEN: ${{ secrets.project_pat }}
          GH_REPOSITORY: ${{ github.repository }}
          PROJECT_ID: ${{ inputs.project_id }}
          STATUS_FIELD_ID: ${{ inputs.project_status_field_id }}
          STATUS_OPTION_ID: ${{ inputs.project_status_option_id }}
        run: |
          # Best-effort: never blocks pulse summary.
          # Uses direct GraphQL (`gh api graphql`) instead of `gh project
          # item-add` because the latter does an owner-type-detection probe
          # that returns "unknown owner type" with classic PATs that have
          # `project` scope but lack `read:user`. GraphQL mutations skip
          # that probe — same auth, fewer scope requirements. Verified
          # against PVT_kwHOA4Uvvc4A8kYP / GRUGBOARD_PROJECT_TOKEN.
          set +e
          set -uo pipefail
          if [[ -z "${GH_TOKEN}" || -z "${PROJECT_ID}" ]]; then
            echo "Project auto-add not configured; skipping. To enable, set inputs.project_id on the caller and pass a PAT as secrets.project_pat."
            exit 0
          fi
          ISSUE_URL=$(cat /tmp/issue_url.txt 2>/dev/null) || { echo "::warning::No issue URL captured; skipping project add."; exit 0; }

          # Resolve the issue's GraphQL node ID — needed as `contentId` on
          # the addProjectV2ItemById mutation.
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '/issues/[0-9]+$' | grep -oE '[0-9]+$')
          if [[ -z "$ISSUE_NUMBER" ]]; then
            echo "::warning::Could not parse issue number from $ISSUE_URL"
            exit 0
          fi
          NODE_OUT=$(gh api "repos/${GH_REPOSITORY}/issues/${ISSUE_NUMBER}" --jq '.node_id' 2>&1)
          NODE_RC=$?
          if [[ $NODE_RC -ne 0 ]]; then
            echo "::warning::issue node_id fetch failed (rc=$NODE_RC). Output: ${NODE_OUT}"
            exit 0
          fi
          ISSUE_NODE_ID="$NODE_OUT"

          # addProjectV2ItemById mutation. Returns the new item's id.
          ADD_OUT=$(gh api graphql \
            -f query='mutation($p:ID!,$c:ID!){addProjectV2ItemById(input:{projectId:$p,contentId:$c}){item{id}}}' \
            -f p="$PROJECT_ID" \
            -f c="$ISSUE_NODE_ID" \
            --jq '.data.addProjectV2ItemById.item.id' 2>&1)
          ADD_RC=$?
          if [[ $ADD_RC -ne 0 ]]; then
            echo "::warning::addProjectV2ItemById failed (rc=$ADD_RC). Output: ${ADD_OUT}"
            exit 0
          fi
          ITEM_ID="$ADD_OUT"
          echo "✓ Pulse issue added to project: $ISSUE_URL (item=$ITEM_ID)"

          # Optional: move to specific status column.
          if [[ -n "${STATUS_FIELD_ID}" && -n "${STATUS_OPTION_ID}" ]]; then
            EDIT_OUT=$(gh api graphql \
              -f query='mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{singleSelectOptionId:$o}}){projectV2Item{id}}}' \
              -f p="$PROJECT_ID" \
              -f i="$ITEM_ID" \
              -f f="$STATUS_FIELD_ID" \
              -f o="$STATUS_OPTION_ID" 2>&1)
            EDIT_RC=$?
            if [[ $EDIT_RC -eq 0 ]]; then
              echo "✓ Status set on item."
            else
              echo "::warning::updateProjectV2ItemFieldValue failed (rc=$EDIT_RC). Output: ${EDIT_OUT}"
            fi
          fi
