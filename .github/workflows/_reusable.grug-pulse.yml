name: Grug · Pulse (reusable)

# Scheduled iteration health summary. Caller workflow opens a daily /
# weekly summary issue with the output. Cross-repo callable.
#
# Consumer caller:
#
#   on:
#     schedule:
#       - cron: '0 13 * * 1'   # Monday 13:00 UTC weekly groom signal
#     workflow_dispatch:
#   jobs:
#     pulse:
#       uses: githumps/grug/.github/workflows/_reusable.grug-pulse.yml@main
#       with:
#         issue_label: "grug-pulse"   # findable later
#       secrets:
#         gh_token: ${{ secrets.GITHUB_TOKEN }}
#         poolside_api_key: ${{ secrets.POOLSIDE_API_KEY }}

on:
  workflow_call:
    inputs:
      issue_label:
        description: "Label applied to the auto-created pulse issue. Use a single label so it's filterable."
        required: false
        type: string
        default: "grug-pulse"
      mode:
        description: "Pulse mode: 'daily' (terse) or 'weekly' (full triage report). Caller sets via schedule cron."
        required: false
        type: string
        default: "weekly"
    secrets:
      gh_token:
        required: false
      poolside_api_key:
        required: false
      grugboard_pat:
        description: "Optional PAT with project:write scope. If set, auto-adds the pulse issue to GitHub Project #1 (Grugboard) and lands it in the Triage column."
        required: false

permissions:
  contents: read
  issues: write
  # Pulse fetches open PRs to compute stuck-PR count; without this perm
  # `gh pr list` returns 0 results and the pulse silently misses PRs.
  pull-requests: read

jobs:
  grug-pulse:
    name: Grug — iteration pulse
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # DD MEDIUM: same `grug-bot` environment as the pr-gate job for
    # secret-scope parity.
    environment: grug-bot
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: githumps/grug
          ref: main
          path: grug

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - run: pip install --quiet "openai>=1.0,<2.0"

      - name: Compute pulse + open issue
        env:
          GH_TOKEN: ${{ secrets.gh_token != '' && secrets.gh_token || secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          POOLSIDE_API_KEY: ${{ secrets.poolside_api_key }}
          PULSE_LABEL: ${{ inputs.issue_label }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          PULSE_BODY=$(python grug/scripts/tpm.py pulse)
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Grug pulse · ${MODE} · ${DATE}"
          echo "$PULSE_BODY" > /tmp/pulse.md
          ISSUE_URL=$(gh issue create \
            --repo "$GH_REPOSITORY" \
            --title "$TITLE" \
            --body-file /tmp/pulse.md \
            --label "$PULSE_LABEL" 2>&1) \
            || { echo "::warning::Failed to create pulse issue: $ISSUE_URL"; exit 0; }
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_URL" > /tmp/issue_url.txt
        id: open_issue

      - name: Land pulse issue on Grugboard (Triage column)
        env:
          GH_TOKEN: ${{ secrets.grugboard_pat }}
          PROJECT_OWNER: githumps
          PROJECT_NUMBER: 1
          STATUS_FIELD_ID: PVTSSF_lAHOA4Uvvc4A8kYPzgwh4fE
          TRIAGE_OPTION_ID: 3e0a104b
        run: |
          # Same set+e rationale as pr-gate wrapper: GitHub Actions runs
          # with implicit `set -eo pipefail`. We branch on RC manually +
          # always exit 0 (Grugboard add is best-effort, never blocks).
          set +e
          set -uo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "Grugboard PAT not provided; skipping project add. Set 'grugboard_pat' secret to enable."
            exit 0
          fi
          ISSUE_URL=$(cat /tmp/issue_url.txt 2>/dev/null) || { echo "::warning::No issue URL captured; skipping Grugboard add."; exit 0; }
          # Add to project + capture item id.
          ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --url "$ISSUE_URL" --format json --jq '.id' 2>/dev/null) \
            || { echo "::warning::Grugboard item-add failed (PAT may lack project:write or repo not in scope). Skipping."; exit 0; }
          PROJECT_ID=$(gh project list --owner "$PROJECT_OWNER" --format json --jq ".projects[] | select(.number == $PROJECT_NUMBER) | .id")
          gh project item-edit \
            --id "$ITEM_ID" \
            --project-id "$PROJECT_ID" \
            --field-id "$STATUS_FIELD_ID" \
            --single-select-option-id "$TRIAGE_OPTION_ID" \
            >/dev/null 2>&1 \
            || echo "::warning::Grugboard status set to Triage failed (added to project but column not set)."
          echo "✓ Pulse issue landed on Grugboard Triage: $ISSUE_URL"
