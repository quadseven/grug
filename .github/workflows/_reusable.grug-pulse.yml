name: Grug · Pulse (reusable)

# Scheduled iteration health summary. Caller workflow opens a daily /
# weekly summary issue with the output. Cross-repo callable.
#
# Consumer caller:
#
#   on:
#     schedule:
#       - cron: '0 13 * * 1'   # Monday 13:00 UTC weekly groom signal
#     workflow_dispatch:
#   jobs:
#     pulse:
#       uses: githumps/grug/.github/workflows/_reusable.grug-pulse.yml@main
#       with:
#         issue_label: "grug-pulse"   # findable later
#       secrets:
#         gh_token: ${{ secrets.GITHUB_TOKEN }}
#         poolside_api_key: ${{ secrets.POOLSIDE_API_KEY }}

on:
  workflow_call:
    inputs:
      issue_label:
        description: "Label applied to the auto-created pulse issue. Use a single label so it's filterable."
        required: false
        type: string
        default: "grug-pulse"
      mode:
        description: "Pulse mode: 'daily' (terse) or 'weekly' (full triage report). Caller sets via schedule cron."
        required: false
        type: string
        default: "weekly"
      label_stale:
        description: "If true, runs label-stale before the pulse summary — labels open issues quiet ≥ stale_days with stale_label."
        required: false
        type: boolean
        default: true
      stale_days:
        description: "Days of inactivity before an issue is considered stale."
        required: false
        type: number
        default: 90
      stale_label:
        description: "Label to apply to stale issues."
        required: false
        type: string
        default: "stale"
      stale_exempt_labels:
        description: "Comma-separated labels that exempt an issue from stale-labelling."
        required: false
        type: string
        default: "epic,pinned,security,grug-pulse"
      project_owner:
        description: "GitHub user or org that owns the target Project v2 board. Required for project auto-add."
        required: false
        type: string
        default: ""
      project_number:
        description: "Project v2 board number (the digit in the project URL: /projects/<N>)."
        required: false
        type: number
        default: 0
      project_status_field_id:
        description: "Optional. Project v2 single-select field ID for Status. If both this and project_status_option_id are set, the pulse issue is moved to that column after add."
        required: false
        type: string
        default: ""
      project_status_option_id:
        description: "Optional. Status option ID (e.g. the 'Triage' column). Paired with project_status_field_id."
        required: false
        type: string
        default: ""
    secrets:
      gh_token:
        required: false
      poolside_api_key:
        required: false
      project_pat:
        description: "Optional PAT with project:write scope. If set together with project_owner + project_number, auto-adds the pulse issue to that Project v2 board."
        required: false

permissions:
  contents: read
  issues: write
  # Pulse fetches open PRs to compute stuck-PR count; without this perm
  # `gh pr list` returns 0 results and the pulse silently misses PRs.
  pull-requests: read

jobs:
  grug-pulse:
    name: Grug — iteration pulse
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # DD MEDIUM: same `grug-bot` environment as the pr-gate job for
    # secret-scope parity.
    environment: grug-bot
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: githumps/grug
          ref: main
          path: grug

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - run: pip install --quiet "openai>=1.0,<2.0"

      - name: Label stale issues (subsumes actions/stale)
        if: ${{ inputs.label_stale }}
        env:
          GH_TOKEN: ${{ secrets.gh_token != '' && secrets.gh_token || secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          STALE_DAYS: ${{ inputs.stale_days }}
          STALE_LABEL: ${{ inputs.stale_label }}
          STALE_EXEMPT_LABELS: ${{ inputs.stale_exempt_labels }}
        run: |
          # Best-effort: never blocks pulse summary.
          set +e
          set -uo pipefail
          python grug/scripts/tpm.py label-stale \
            || echo "::warning::label-stale exited non-zero; pulse continues"

      - name: Compute pulse + open issue
        env:
          GH_TOKEN: ${{ secrets.gh_token != '' && secrets.gh_token || secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          POOLSIDE_API_KEY: ${{ secrets.poolside_api_key }}
          PULSE_LABEL: ${{ inputs.issue_label }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          PULSE_BODY=$(python grug/scripts/tpm.py pulse)
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Grug pulse · ${MODE} · ${DATE}"
          echo "$PULSE_BODY" > /tmp/pulse.md
          ISSUE_URL=$(gh issue create \
            --repo "$GH_REPOSITORY" \
            --title "$TITLE" \
            --body-file /tmp/pulse.md \
            --label "$PULSE_LABEL" 2>&1) \
            || { echo "::warning::Failed to create pulse issue: $ISSUE_URL"; exit 0; }
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_URL" > /tmp/issue_url.txt
        id: open_issue

      - name: Auto-add pulse issue to Project v2 (optional)
        env:
          GH_TOKEN: ${{ secrets.project_pat }}
          PROJECT_OWNER: ${{ inputs.project_owner }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          STATUS_FIELD_ID: ${{ inputs.project_status_field_id }}
          STATUS_OPTION_ID: ${{ inputs.project_status_option_id }}
        run: |
          # Same set+e rationale as pr-gate wrapper: GitHub Actions runs
          # with implicit `set -eo pipefail`. Branch on RC manually +
          # always exit 0 (project add is best-effort, never blocks).
          set +e
          set -uo pipefail
          if [[ -z "${GH_TOKEN}" || -z "${PROJECT_OWNER}" || "${PROJECT_NUMBER}" == "0" ]]; then
            echo "Project auto-add not configured; skipping. To enable, set inputs.project_owner + inputs.project_number on the caller and pass a PAT as secrets.project_pat."
            exit 0
          fi
          ISSUE_URL=$(cat /tmp/issue_url.txt 2>/dev/null) || { echo "::warning::No issue URL captured; skipping project add."; exit 0; }
          ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --url "$ISSUE_URL" --format json --jq '.id' 2>/dev/null) \
            || { echo "::warning::project item-add failed (PAT may lack project:write, or owner/number wrong). Skipping."; exit 0; }
          echo "✓ Pulse issue added to project ${PROJECT_OWNER}/${PROJECT_NUMBER}: $ISSUE_URL"
          if [[ -n "${STATUS_FIELD_ID}" && -n "${STATUS_OPTION_ID}" ]]; then
            PROJECT_ID=$(gh project list --owner "$PROJECT_OWNER" --format json --jq ".projects[] | select(.number == $PROJECT_NUMBER) | .id")
            gh project item-edit \
              --id "$ITEM_ID" \
              --project-id "$PROJECT_ID" \
              --field-id "$STATUS_FIELD_ID" \
              --single-select-option-id "$STATUS_OPTION_ID" \
              >/dev/null 2>&1 \
              && echo "✓ Status set on item." \
              || echo "::warning::Status field set failed (added to project but column not moved)."
          fi
