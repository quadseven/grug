# Kubernetes deploy for grug (#354 self-hosting migration).
#
# PUBLIC-REPO DISCIPLINE: no infrastructure identifiers are committed -
# the registry host, cluster credentials, and join credentials all
# arrive via the `k8s-prod` GitHub environment (vars/secrets), and the
# manifests carry REGISTRY_PLACEHOLDER/TAG_PLACEHOLDER pins that this
# workflow rewrites at deploy time.
#
# Required environment configuration (operator-seeded, never committed):
#   vars.DEPLOY_REGISTRY_HOST     - private registry hostname
#   secrets.TS_AUTHKEY            - tag-scoped ephemeral join key
#   secrets.REGISTRY_USERNAME     - registry push credential
#   secrets.REGISTRY_PASSWORD
#   secrets.KUBECONFIG_B64        - cluster credential (base64)
#   secrets.AWS_ACCOUNT_ID        - existing grug-gha-deploy OIDC role
#                                   (reads the /grug/* parameter store
#                                   namespace for the app secret seed)
#
# Native arm64 build (ubuntu-24.04-arm hosted runner, free for public
# repos) - the target nodes are arm64 and emulation is banned org-wide.
name: deploy.k8s

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'k8s/**'
      - '.github/workflows/deploy.k8s.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-k8s
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_dispatch carries no branch restriction by itself - without
    # this guard a manual run from any ref reaches the environment
    # secrets (review F1; also set the environment protection rule to
    # main-only as defense in depth).
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    environment: k8s-prod
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          # Pre-minted tag:ci authkey (ephemeral+reusable, 90-day expiry
          # tracked in the parameter store) - no OAuth client needed.
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci
          use-cache: 'true'

      - name: Configure AWS credentials (app-secret seed)
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100 # v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/grug-gha-deploy
          aws-region: us-east-1

      - name: Registry login
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" \
            --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build + push images (native arm64)
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
        run: |
          set -euo pipefail
          for svc in webhook api; do
            # Context is services/ (ADR-0014): the image COPYs both the
            # service tree and services/_shared/.
            docker build services \
              -f "services/Dockerfile" --build-arg SERVICE="$svc" \
              -t "$REGISTRY_HOST/grug-$svc:${GITHUB_SHA}" \
              --build-arg DD_GIT_REPOSITORY_URL="github.com/${GITHUB_REPOSITORY}" \
              --build-arg DD_GIT_COMMIT_SHA="${GITHUB_SHA}"
            docker push "$REGISTRY_HOST/grug-$svc:${GITHUB_SHA}"
            # Capture the IMMUTABLE digest the registry assigned and deploy
            # by @sha256, not the mutable tag (audit #7: a tag can be
            # overwritten in the registry to serve a different image; a
            # digest pins exactly what we just built + pushed).
            digest="$(docker inspect --format='{{index .RepoDigests 0}}' \
              "$REGISTRY_HOST/grug-$svc:${GITHUB_SHA}")"
            if [ -z "$digest" ]; then
              echo "::error::no RepoDigest for grug-$svc after push"; exit 1
            fi
            echo "IMAGE_${svc^^}=${digest}" >> "$GITHUB_ENV"
          done

      - name: Write kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          install -m 700 -d "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Seed app secrets from the parameter store
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          get() { aws ssm get-parameter --name "$1" --with-decryption \
                    --query 'Parameter.Value' --output text; }
          # seed <secret-name> <0600-env-file>: shared discipline for every
          # Secret seed (audit #388-4 rule-of-three) - fail BEFORE the
          # destructive delete on any empty/"None" value (`set -e` does NOT
          # trip on command-substitution failures inside `echo "K=$(...)"`,
          # audit C2; print only KEY names), then DELETE-then-create
          # (kubectl apply MERGES secret data - stale keys lingered on the
          # first deploys), then delete the env-file.
          seed() {
            if grep -qE '=$|=None$' "$2"; then
              echo "::error::empty/None value(s) in $1 seed:"
              grep -nE '=$|=None$' "$2" | cut -d= -f1
              exit 1
            fi
            kubectl -n grug delete secret "$1" --ignore-not-found
            kubectl -n grug create secret generic "$1" --from-env-file="$2"
            rm -f "$2"
          }
          # Values land in a 0600 env-file consumed via --from-env-file -
          # NOT in kubectl argv (visible in /proc/PID/cmdline even on an
          # ephemeral runner; review F3). Multiline values (the App
          # private key) ride base64 in the env-file; the app reads the
          # _B64 form (decode at startup) for exactly this reason.
          # The app self-loads its secrets from the parameter store at
          # runtime (secrets_loader + the *_SSM path envs in the
          # manifests) - the pod secret carries ONLY the AWS credential
          # authorizing those reads, the database URL, and two
          # deploy-resolved values that must not be committed as
          # literals (the queue URL embeds the account id).
          # grug-secrets is APP CONFIG ONLY (#389: the static-key world is
          # retired). The AWS_* leak guard below stays load-bearing: env
          # creds would out-rank credential_process in the SDK chain and
          # silently bypass the Roles Anywhere path every pod boot-proves.
          ENVF="$RUNNER_TEMP/grug-secrets.env"
          install -m 600 /dev/null "$ENVF"
          {
            echo "AWS_DEFAULT_REGION=us-east-1"
            echo "GRUG_DATABASE_URL=$(get /grug/database-url)"
            # GRUG_KMS_CMK_ARN: envelope-encryption CMK for OAuth/credential
            # blobs (crypto/kms_envelope.encrypt_for_user hard-requires it at
            # call time). The Lambda env had it; the k8s secret-seed missed
            # it, so the dashboard OAuth callback 500'd on first sign-in.
            # Sourced from SSM (the ARN carries the account id - keep it out
            # of the repo). The KMS grant lives on the ra-grug tenant role's
            # inline policy (infrastructure repo) since #389.
            echo "GRUG_KMS_CMK_ARN=$(get /grug/kms-cmk-arn)"
            echo "GRUG_CAVE_JOBS_QUEUE_URL=$(aws sqs get-queue-url --queue-name grug-cave-jobs.fifo --query QueueUrl --output text)"
            echo "GRUG_RERUN_QUEUE_URL=$(aws sqs get-queue-url --queue-name grug-rerun-jobs.fifo --query QueueUrl --output text)"
            echo "GRUG_CAVE_RESULTS_QUEUE_URL=$(aws sqs get-queue-url --queue-name grug-cave-results.fifo --query QueueUrl --output text)"
            echo "GRUG_CAVE_DIFF_BUCKET=$(aws s3api list-buckets --query 'Buckets[?starts_with(Name, `grug-cave-diffs`)].Name | [0]' --output text)"
          } > "$ENVF"
          # #388 split guard (grug-secrets ONLY, so not in seed()): the
          # static creds must NEVER enter this Secret - every workload
          # envFroms it, and env creds silently out-rank credential_process,
          # bypassing the Roles Anywhere path each pod boot-proves (runtime
          # twin: services/_shared/aws_identity.prove_roles_anywhere_identity).
          if grep -qE '^AWS_(ACCESS_KEY_ID|SECRET_ACCESS_KEY)=' "$ENVF"; then
            echo "::error::static AWS creds must never enter grug-secrets - the fleet is Roles Anywhere-only (#389)"
            exit 1
          fi
          seed grug-secrets "$ENVF"
          # #389 RETIREMENT: the static key, its reserve Secret, the #386
          # rotator (CronJob + Secret + IAM user), and the SSM key params
          # are GONE - the fleet authenticates via Roles Anywhere only.
          # One-time live cleanup (idempotent; #507 removes these lines +
          # the completeness-test exemption after the first observed run):
          kubectl -n grug delete secret grug-aws-static-key grug-rotator-secret --ignore-not-found
          kubectl -n grug delete cronjob grug-key-rotator --ignore-not-found
          kubectl -n grug create secret docker-registry registry-pull \
            --docker-server="$REGISTRY_HOST" \
            --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          # grug-trial (Smasher sandbox, ADR-0013) is a SEPARATE namespace whose
          # janitor + Trial pods pull the same private grug image, so it needs its
          # OWN registry-pull secret. Without it every janitor run (*/15) hits
          # ImagePullBackOff ("no basic auth credentials") and pages the
          # cluster ImagePullBackOff monitor. The namespace is (re)applied by the
          # `kubectl apply -k k8s/` step below; create it here idempotently so the
          # seed lands even on a first deploy. (Was a manual DEPLOY NOTE in
          # k8s/smasher-trial-namespace.yaml that got missed -> now codified.)
          kubectl create namespace grug-trial --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n grug-trial create secret docker-registry registry-pull \
            --docker-server="$REGISTRY_HOST" \
            --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Pin image placeholders + apply
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
        run: |
          set -euo pipefail
          # Pin images by digest (audit #7): replace each FULL
          # registry/name:tag image token with the @sha256 digest captured at
          # push time. Order matters - do the image tokens FIRST, then the
          # bare `TAG_PLACEHOLDER` substitution below only hits the remaining
          # standalone uses (the DD_VERSION env value: TAG_PLACEHOLDER), which
          # must still resolve to the git SHA for version tagging.
          # Roles Anywhere tenant ARNs (#388): seeded from SSM into the
          # grug-aws-config ConfigMap - the ARNs carry the account id, so
          # the PUBLIC repo holds only placeholders. Fail LOUD on an empty
          # lookup (the tenant must be applied in infrastructure first).
          # --with-decryption is harmless on String params and REQUIRED if
          # one is ever (re)created SecureString: without it the value is
          # KMS ciphertext - non-empty, not None, placeholder-free - and
          # sails past every guard into the ConfigMap (audit #388-4). The
          # arn: shape check catches that and any other garbage.
          RA_ANCHOR="$(aws ssm get-parameter --with-decryption --name /infra/roles-anywhere/trust_anchor_arn --query Parameter.Value --output text)"
          RA_PROFILE="$(aws ssm get-parameter --with-decryption --name /infra/roles-anywhere/grug/profile_arn --query Parameter.Value --output text)"
          RA_ROLE="$(aws ssm get-parameter --with-decryption --name /infra/roles-anywhere/grug/role_arn --query Parameter.Value --output text)"
          # Per-SERVICE shapes (peer review): a syntactically-valid but
          # wrong-service ARN (iam where rolesanywhere belongs, etc) must
          # die here, not at the first poller tick.
          check_arn() {
            case "$2" in
              $3) ;;
              *)
                echo "::error::Roles Anywhere lookup $1 has the wrong shape (got: unlogged; expected $3) - is the grug tenant applied in infrastructure (infra-pki)?"
                exit 1
                ;;
            esac
          }
          check_arn RA_ANCHOR "$RA_ANCHOR" 'arn:aws:rolesanywhere:*:*:trust-anchor/*'
          check_arn RA_PROFILE "$RA_PROFILE" 'arn:aws:rolesanywhere:*:*:profile/*'
          check_arn RA_ROLE "$RA_ROLE" 'arn:aws:iam::*:role/*'
          sed -i \
            -e "s|REGISTRY_PLACEHOLDER/grug-api:TAG_PLACEHOLDER|${IMAGE_API}|g" \
            -e "s|REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER|${IMAGE_WEBHOOK}|g" \
            -e "s|TAG_PLACEHOLDER|${GITHUB_SHA}|g" \
            -e "s|RA_TRUST_ANCHOR_ARN_PLACEHOLDER|${RA_ANCHOR}|g" \
            -e "s|RA_PROFILE_ARN_PLACEHOLDER|${RA_PROFILE}|g" \
            -e "s|RA_ROLE_ARN_PLACEHOLDER|${RA_ROLE}|g" \
            k8s/*.yaml
          # Post-sed sentinel: a future manifest that escapes substitution
          # must fail the deploy, not ship a literal placeholder (F7).
          if grep -rn 'REGISTRY_PLACEHOLDER\|TAG_PLACEHOLDER\|RA_.*_ARN_PLACEHOLDER' k8s/; then
            echo "::error::unsubstituted placeholder in k8s/"; exit 1
          fi
          kubectl apply -k k8s/
          for d in grug-webhook grug-api grug-consumer; do
            kubectl -n grug rollout status deploy/$d --timeout=180s
          done
          # CronJob smoke (F5): a broken image/command/secret must fail
          # THIS deploy, not the next scheduled tick.
          kubectl -n grug delete job poller-smoke --ignore-not-found
          kubectl -n grug create job poller-smoke --from=cronjob/grug-poller
          kubectl -n grug wait --for=condition=complete job/poller-smoke --timeout=300s || {
            echo "::error::poller-smoke failed - dumping job logs (identity proof / cert chain?)"
            kubectl -n grug logs job/poller-smoke --tail=50 || true
            exit 1
          }
          kubectl -n grug delete job poller-smoke

      - name: Cleanup
        if: always()
        run: rm -f "$HOME/.kube/config"
