# Kubernetes deploy for grug (#354 self-hosting migration).
#
# PUBLIC-REPO DISCIPLINE: no infrastructure identifiers are committed -
# the registry host, cluster credentials, and join credentials all
# arrive via the `k8s-prod` GitHub environment (vars/secrets), and the
# manifests carry REGISTRY_PLACEHOLDER/TAG_PLACEHOLDER pins that this
# workflow rewrites at deploy time.
#
# Required environment configuration (operator-seeded, never committed):
#   vars.DEPLOY_REGISTRY_HOST     - private registry hostname (since #498
#                                   ALSO seeded at repo level for the PR
#                                   gate's promotion push)
#   secrets.TS_AUTHKEY            - tag-scoped ephemeral join key
#   secrets.REGISTRY_USERNAME     - registry push credential
#   secrets.REGISTRY_PASSWORD
#   secrets.KUBECONFIG_B64        - cluster credential (base64)
#   secrets.AWS_ACCOUNT_ID        - existing grug-gha-deploy OIDC role
#                                   (reads the /grug/* parameter store
#                                   namespace for the app secret seed)
#
# Native arm64 build (ubuntu-24.04-arm hosted runner, free for public
# repos) - the target nodes are arm64 and emulation is banned org-wide.
name: deploy.k8s

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'k8s/**'
      - 'scripts/promotion.py'
      - '.github/workflows/deploy.k8s.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  pull-requests: read  # ADR-0016: resolve the merged PR for digest promotion

concurrency:
  group: deploy-k8s
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_dispatch carries no branch restriction by itself - without
    # this guard a manual run from any ref reaches the environment
    # secrets (review F1; also set the environment protection rule to
    # main-only as defense in depth).
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    environment: k8s-prod
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          # Pre-minted tag:ci authkey (ephemeral+reusable, 90-day expiry
          # tracked in the parameter store) - no OAuth client needed.
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci
          use-cache: 'true'

      - name: Configure AWS credentials (app-secret seed)
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100 # v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/grug-gha-deploy
          aws-region: us-east-1

      - name: Registry login
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" \
            --username "$REGISTRY_USERNAME" --password-stdin

      - name: Resolve promotion (ADR-0016)
        id: promo
        # continue-on-error: plumbing failures here must degrade to the
        # rebuild path (promotion is an optimization, never a requirement);
        # the rebuild step keys on promote != 'true', which a failed/empty
        # step satisfies.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
        run: |
          set -euo pipefail
          # Gather the facts; scripts/promotion.py (pure, unit-tested)
          # decides. Every gh/docker probe failure lands as an empty fact
          # or a false manifest bit = rebuild - with its stderr surfaced as
          # a ::warning so a 403/auth/network failure is not misread as a
          # clean absence (audit stage-2).
          gh_fact() {  # gh_fact <out-default> <args...>
            local out
            if out=$(gh api "$@" 2> "$RUNNER_TEMP/gh-err.txt"); then
              printf '%s' "$out"
            else
              echo "::warning::gh api $1 failed: $(head -c 200 "$RUNNER_TEMP/gh-err.txt")"
              printf ''
            fi
          }
          prs_json="[]"; head_sha=""; head_tree=""; merge_tree=""
          manifest_flags=()
          if [ "${{ github.event_name }}" = "push" ]; then
            prs_json=$(gh_fact "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '[.[] | select(.merged_at != null) | .number]')
            prs_json=${prs_json:-[]}
          fi
          pr_num=$(printf '%s' "$prs_json" | python3 -c "import json,sys; v=json.load(sys.stdin); print(v[0] if len(v)==1 else '')" 2>/dev/null || echo "")
          if [ -n "$pr_num" ]; then
            merge_tree=$(gh_fact "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}" --jq .commit.tree.sha)
            head_sha=$(gh_fact "repos/${GITHUB_REPOSITORY}/pulls/${pr_num}" --jq .head.sha)
            if [ -n "$head_sha" ]; then
              head_tree=$(gh_fact "repos/${GITHUB_REPOSITORY}/commits/${head_sha}" --jq .commit.tree.sha)
            fi
            # Did the image-build gate RUN for this head at all? A
            # workflow-only merge never triggers it - the absent artifact
            # is then an EXPECTED rebuild, not the alertable
            # artifact-missing case (#499 reclassification).
            gate_ran="unknown"
            if [ -n "$head_sha" ]; then
              cr=$(gh_fact "repos/${GITHUB_REPOSITORY}/commits/${head_sha}/check-runs?check_name=image-build%20(webhook)" --jq '.total_count')
              case "$cr" in
                0) gate_ran="false" ;;
                ''|*[!0-9]*) gate_ran="unknown" ;;
                *) gate_ran="true" ;;
              esac
            fi
            for svc in webhook api; do
              present=false
              if err=$(docker manifest inspect "$REGISTRY_HOST/grug-$svc:pr-${pr_num}" 2>&1 >/dev/null); then
                present=true
              elif ! printf '%s' "$err" | grep -qiE 'manifest unknown|not found|no such manifest'; then
                echo "::warning::manifest probe grug-$svc:pr-${pr_num} failed (non-absence): $(printf '%s' "$err" | head -c 160)"
              fi
              manifest_flags+=("--manifest" "$svc=$present")
            done
          else
            manifest_flags+=("--manifest" "webhook=false" "--manifest" "api=false")
          fi
          python3 scripts/promotion.py \
            --pr-numbers-json "$prs_json" \
            --head-tree "$head_tree" --merge-tree "$merge_tree" \
            --expected-services webhook,api \
            --gate-ran "${gate_ran:-unknown}" \
            "${manifest_flags[@]}" | tee -a "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Rebuild-cause triage
        if: steps.promo.outputs.promote != 'true'
        env:
          CATEGORY: ${{ steps.promo.outputs.category }}
          REASON: ${{ steps.promo.outputs.reason }}
        run: |
          # env-var indirection - the reason string is data, not code
          # (audit stage-8 injection sink), so it must never reach this
          # script via expression interpolation. (And a dollar-brace
          # expression literal must never appear in a run block AT ALL,
          # even in a comment - GitHub evaluates it anywhere in the
          # string; the first version of this very comment parse-failed
          # the whole workflow.)
          echo "rebuild (${CATEGORY:-unknown}): ${REASON:-resolve step failed}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${CATEGORY}" = "artifact-missing" ]; then
            echo "::warning::promotion EXPECTED but pr artifact absent - check the gate's push / CI_* seeding (silent promotion death otherwise)"
          fi

      - name: Promote PR-tested digests (server-side retag)
        id: promote
        if: steps.promo.outputs.promote == 'true'
        # A retag failure must fall back to rebuild, not kill the deploy;
        # a HALF-promoted registry heals because the rebuild path pushes
        # the same merge-sha tags right over the orphans.
        continue-on-error: true
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          PR_NUM: ${{ steps.promo.outputs.pr_num }}
          HEAD_SHA: ${{ steps.promo.outputs.head_sha }}
        run: |
          set -euo pipefail
          for svc in webhook api; do
            # Resolve the tag to a DIGEST once, then read AND retag via
            # @digest only: content-addressed reads make the verify+retag
            # single-read consistent - a tag swap between steps cannot
            # switch the artifact under us (spark peer review TOCTOU).
            digest=$(docker buildx imagetools inspect \
              "$REGISTRY_HOST/grug-$svc:pr-${PR_NUM}" --format '{{.Manifest.Digest}}')
            # Verify the ARTIFACT, not just the git graph: the baked
            # DD_GIT_COMMIT_SHA must equal the PR head sha. Closes the
            # stale-tag vectors tree identity cannot see (superseded gate
            # run finishing late, path-filter dropout, merge-ref build) -
            # audit stages 5, 6 and 8.
            env_json=$(docker buildx imagetools inspect \
              "$REGISTRY_HOST/grug-$svc@${digest}" \
              --format '{{json .Image.Config.Env}}')
            verdict=$(python3 scripts/promotion.py --verify-baked-sha "$env_json" "$HEAD_SHA")
            printf '%s\n' "$verdict"
            if ! printf '%s' "$verdict" | grep -q '^verified=true'; then
              echo "::warning::grug-$svc:pr-${PR_NUM} failed baked-sha verification - falling back to rebuild"
              exit 1
            fi
            # Server-side retag: the merge sha tag points at the EXACT
            # PR-tested manifest - no rebuild, no layer transfer. NOTE the
            # merge-sha tag then SHARES a manifest with pr-<n>; safe
            # because the retention CronJob deletes by TAG (dist-spec v3),
            # never by digest - see ADR-0016.
            docker buildx imagetools create \
              -t "$REGISTRY_HOST/grug-$svc:${GITHUB_SHA}" \
              "$REGISTRY_HOST/grug-$svc@${digest}"
            echo "IMAGE_${svc^^}=$REGISTRY_HOST/grug-$svc@${digest}" >> "$GITHUB_ENV"
          done
          echo "IMAGE_SOURCE=promoted-pr-${PR_NUM}" >> "$GITHUB_ENV"
          echo "promoted pr-${PR_NUM} digests (no rebuild)" >> "$GITHUB_STEP_SUMMARY"

      - name: Build + push images (native arm64)
        if: steps.promo.outputs.promote != 'true' || steps.promote.outcome != 'success'
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
        run: |
          set -euo pipefail
          echo "IMAGE_SOURCE=rebuilt" >> "$GITHUB_ENV"
          for svc in webhook api; do
            # Context is services/ (ADR-0014): the image COPYs both the
            # service tree and services/_shared/.
            docker build services \
              -f "services/Dockerfile" --build-arg SERVICE="$svc" \
              -t "$REGISTRY_HOST/grug-$svc:${GITHUB_SHA}" \
              --build-arg DD_GIT_REPOSITORY_URL="github.com/${GITHUB_REPOSITORY}" \
              --build-arg DD_GIT_COMMIT_SHA="${GITHUB_SHA}"
            docker push "$REGISTRY_HOST/grug-$svc:${GITHUB_SHA}"
            # Capture the IMMUTABLE digest the registry assigned and deploy
            # by @sha256, not the mutable tag (audit #7: a tag can be
            # overwritten in the registry to serve a different image; a
            # digest pins exactly what we just built + pushed).
            digest="$(docker inspect --format='{{index .RepoDigests 0}}' \
              "$REGISTRY_HOST/grug-$svc:${GITHUB_SHA}")"
            if [ -z "$digest" ]; then
              echo "::error::no RepoDigest for grug-$svc after push"; exit 1
            fi
            echo "IMAGE_${svc^^}=${digest}" >> "$GITHUB_ENV"
          done

      - name: Write kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          install -m 700 -d "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Seed app secrets from the parameter store
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          get() { aws ssm get-parameter --name "$1" --with-decryption \
                    --query 'Parameter.Value' --output text; }
          # seed <secret-name> <0600-env-file>: shared discipline for every
          # Secret seed (audit #388-4 rule-of-three) - fail BEFORE the
          # destructive delete on any empty/"None" value (`set -e` does NOT
          # trip on command-substitution failures inside `echo "K=$(...)"`,
          # audit C2; print only KEY names), then DELETE-then-create
          # (kubectl apply MERGES secret data - stale keys lingered on the
          # first deploys), then delete the env-file.
          seed() {
            if grep -qE '=$|=None$' "$2"; then
              echo "::error::empty/None value(s) in $1 seed:"
              grep -nE '=$|=None$' "$2" | cut -d= -f1
              exit 1
            fi
            kubectl -n grug delete secret "$1" --ignore-not-found
            kubectl -n grug create secret generic "$1" --from-env-file="$2"
            rm -f "$2"
          }
          # Values land in a 0600 env-file consumed via --from-env-file -
          # NOT in kubectl argv (visible in /proc/PID/cmdline even on an
          # ephemeral runner; review F3). Multiline values (the App
          # private key) ride base64 in the env-file; the app reads the
          # _B64 form (decode at startup) for exactly this reason.
          # The app self-loads its secrets from the parameter store at
          # runtime (secrets_loader + the *_SSM path envs in the
          # manifests) - the pod secret carries ONLY the AWS credential
          # authorizing those reads, the database URL, and two
          # deploy-resolved values that must not be committed as
          # literals (the queue URL embeds the account id).
          # grug-secrets is APP CONFIG ONLY (#389: the static-key world is
          # retired). The AWS_* leak guard below stays load-bearing: env
          # creds would out-rank credential_process in the SDK chain and
          # silently bypass the Roles Anywhere path every pod boot-proves.
          # Snapshot the CURRENT grug-secrets before the destructive
          # delete+create (codex r3): auto-rollback restores it alongside
          # the images, so a bad-but-non-empty SSM value cannot survive a
          # rollback. Metadata stripped so kubectl apply accepts it.
          kubectl -n grug get secret grug-secrets -o json --ignore-not-found \
            | python3 -c "import json,sys; d=sys.stdin.read(); d=json.loads(d) if d.strip() else None; [d['metadata'].pop(k, None) for k in ('resourceVersion','uid','creationTimestamp','managedFields') ] if d else None; print(json.dumps(d)) if d else None" \
            > "$RUNNER_TEMP/grug-secrets.pre.json" || true
          ENVF="$RUNNER_TEMP/grug-secrets.env"
          install -m 600 /dev/null "$ENVF"
          {
            echo "AWS_DEFAULT_REGION=us-east-1"
            echo "GRUG_DATABASE_URL=$(get /grug/database-url)"
            # GRUG_KMS_CMK_ARN: envelope-encryption CMK for OAuth/credential
            # blobs (crypto/kms_envelope.encrypt_for_user hard-requires it at
            # call time). The Lambda env had it; the k8s secret-seed missed
            # it, so the dashboard OAuth callback 500'd on first sign-in.
            # Sourced from SSM (the ARN carries the account id - keep it out
            # of the repo). The KMS grant lives on the ra-grug tenant role's
            # inline policy (infrastructure repo) since #389.
            echo "GRUG_KMS_CMK_ARN=$(get /grug/kms-cmk-arn)"
            echo "GRUG_CAVE_JOBS_QUEUE_URL=$(aws sqs get-queue-url --queue-name grug-cave-jobs.fifo --query QueueUrl --output text)"
            echo "GRUG_RERUN_QUEUE_URL=$(aws sqs get-queue-url --queue-name grug-rerun-jobs.fifo --query QueueUrl --output text)"
            echo "GRUG_CAVE_RESULTS_QUEUE_URL=$(aws sqs get-queue-url --queue-name grug-cave-results.fifo --query QueueUrl --output text)"
            echo "GRUG_CAVE_DIFF_BUCKET=$(aws s3api list-buckets --query 'Buckets[?starts_with(Name, `grug-cave-diffs`)].Name | [0]' --output text)"
          } > "$ENVF"
          # #388 split guard (grug-secrets ONLY, so not in seed()): the
          # static creds must NEVER enter this Secret - every workload
          # envFroms it, and env creds silently out-rank credential_process,
          # bypassing the Roles Anywhere path each pod boot-proves (runtime
          # twin: services/_shared/aws_identity.prove_roles_anywhere_identity).
          if grep -qE '^AWS_(ACCESS_KEY_ID|SECRET_ACCESS_KEY)=' "$ENVF"; then
            echo "::error::static AWS creds must never enter grug-secrets - the fleet is Roles Anywhere-only (#389)"
            exit 1
          fi
          seed grug-secrets "$ENVF"
          # #389 RETIREMENT: the fleet authenticates via Roles Anywhere
          # only; the static-key world (Secrets, rotator, IAM users, SSM
          # params) was deleted and verified gone (#507).
          kubectl -n grug create secret docker-registry registry-pull \
            --docker-server="$REGISTRY_HOST" \
            --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          # grug-trial (Smasher sandbox, ADR-0013) is a SEPARATE namespace whose
          # janitor + Trial pods pull the same private grug image, so it needs its
          # OWN registry-pull secret. Without it every janitor run (*/15) hits
          # ImagePullBackOff ("no basic auth credentials") and pages the
          # cluster ImagePullBackOff monitor. The namespace is (re)applied by the
          # `kubectl apply -k k8s/` step below; create it here idempotently so the
          # seed lands even on a first deploy. (Was a manual DEPLOY NOTE in
          # k8s/smasher-trial-namespace.yaml that got missed -> now codified.)
          kubectl create namespace grug-trial --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n grug-trial create secret docker-registry registry-pull \
            --docker-server="$REGISTRY_HOST" \
            --docker-username="$REGISTRY_USERNAME" \
            --docker-password="$REGISTRY_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Record last-good digests (rollback anchor, #499)
        run: |
          set -euo pipefail
          # Snapshot the CURRENTLY-RUNNING digest pair before we touch
          # anything - it survived its own deploy's synthetic, so it is
          # the rollback target. Skip (keep the previous anchor) unless
          # every workload is currently Available: never anchor a broken
          # state.
          ok=true
          for d in grug-webhook grug-api grug-consumer; do
            avail=$(kubectl -n grug get deploy "$d" -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || echo "")
            [ "$avail" = "True" ] || ok=false
          done
          if [ "$ok" = "true" ]; then
            W=$(kubectl -n grug get deploy grug-webhook -o jsonpath='{.spec.template.spec.containers[0].image}')
            A=$(kubectl -n grug get deploy grug-api -o jsonpath='{.spec.template.spec.containers[0].image}')
            FROM=$(kubectl -n grug get deploy grug-webhook -o jsonpath='{.metadata.annotations.grug\.dev/merge-sha}' 2>/dev/null || echo unknown)
            kubectl -n grug create configmap grug-last-good \
              --from-literal=webhook="$W" --from-literal=api="$A" \
              --from-literal=recorded_from_sha="$FROM" \
              --dry-run=client -o yaml | kubectl apply -f -
            echo "last-good anchor recorded (from ${FROM})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::workloads not all Available pre-apply - keeping the previous last-good anchor"
          fi

      - name: Pin image placeholders + apply
        id: apply
        # continue-on-error so a FAILED apply/rollout/smoke still reaches
        # the rollback step below (codex peer review: a bad image or
        # manifest aborting here is exactly when recovery matters most);
        # the rollback + the run's final state stay loud.
        continue-on-error: true
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
        run: |
          set -euo pipefail
          # Pin images by digest (audit #7): replace each FULL
          # registry/name:tag image token with the @sha256 digest captured at
          # push time. Order matters - do the image tokens FIRST, then the
          # bare `TAG_PLACEHOLDER` substitution below only hits the remaining
          # standalone uses (the DD_VERSION env value: TAG_PLACEHOLDER), which
          # must still resolve to the git SHA for version tagging.
          # Roles Anywhere tenant ARNs (#388): seeded from SSM into the
          # grug-aws-config ConfigMap - the ARNs carry the account id, so
          # the PUBLIC repo holds only placeholders. Fail LOUD on an empty
          # lookup (the tenant must be applied in infrastructure first).
          # --with-decryption is harmless on String params and REQUIRED if
          # one is ever (re)created SecureString: without it the value is
          # KMS ciphertext - non-empty, not None, placeholder-free - and
          # sails past every guard into the ConfigMap (audit #388-4). The
          # arn: shape check catches that and any other garbage.
          RA_ANCHOR="$(aws ssm get-parameter --with-decryption --name /infra/roles-anywhere/trust_anchor_arn --query Parameter.Value --output text)"
          RA_PROFILE="$(aws ssm get-parameter --with-decryption --name /infra/roles-anywhere/grug/profile_arn --query Parameter.Value --output text)"
          RA_ROLE="$(aws ssm get-parameter --with-decryption --name /infra/roles-anywhere/grug/role_arn --query Parameter.Value --output text)"
          # Per-SERVICE shapes (peer review): a syntactically-valid but
          # wrong-service ARN (iam where rolesanywhere belongs, etc) must
          # die here, not at the first poller tick.
          check_arn() {
            case "$2" in
              $3) ;;
              *)
                echo "::error::Roles Anywhere lookup $1 has the wrong shape (got: unlogged; expected $3) - is the grug tenant applied in infrastructure (infra-pki)?"
                exit 1
                ;;
            esac
          }
          check_arn RA_ANCHOR "$RA_ANCHOR" 'arn:aws:rolesanywhere:*:*:trust-anchor/*'
          check_arn RA_PROFILE "$RA_PROFILE" 'arn:aws:rolesanywhere:*:*:profile/*'
          check_arn RA_ROLE "$RA_ROLE" 'arn:aws:iam::*:role/*'
          sed -i \
            -e "s|REGISTRY_PLACEHOLDER/grug-api:TAG_PLACEHOLDER|${IMAGE_API}|g" \
            -e "s|REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER|${IMAGE_WEBHOOK}|g" \
            -e "s|TAG_PLACEHOLDER|${GITHUB_SHA}|g" \
            -e "s|RA_TRUST_ANCHOR_ARN_PLACEHOLDER|${RA_ANCHOR}|g" \
            -e "s|RA_PROFILE_ARN_PLACEHOLDER|${RA_PROFILE}|g" \
            -e "s|RA_ROLE_ARN_PLACEHOLDER|${RA_ROLE}|g" \
            k8s/*.yaml
          # Post-sed sentinel: a future manifest that escapes substitution
          # must fail the deploy, not ship a literal placeholder (F7).
          if grep -rn 'REGISTRY_PLACEHOLDER\|TAG_PLACEHOLDER\|RA_.*_ARN_PLACEHOLDER' k8s/; then
            echo "::error::unsubstituted placeholder in k8s/"; exit 1
          fi
          kubectl apply -k k8s/
          for d in grug-webhook grug-api grug-consumer; do
            kubectl -n grug rollout status deploy/$d --timeout=180s
          done
          # CronJob smoke (F5): a broken image/command/secret must fail
          # THIS deploy, not the next scheduled tick.
          kubectl -n grug delete job poller-smoke --ignore-not-found
          kubectl -n grug create job poller-smoke --from=cronjob/grug-poller
          kubectl -n grug wait --for=condition=complete job/poller-smoke --timeout=300s || {
            echo "::error::poller-smoke failed - dumping job logs (identity proof / cert chain?)"
            kubectl -n grug logs job/poller-smoke --tail=50 || true
            exit 1
          }
          kubectl -n grug delete job poller-smoke
          # Provenance (ADR-0016): record on the workloads how these images
          # reached prod - the promoted-vs-rebuilt trail #499's rollback
          # machinery will read.
          kubectl -n grug annotate --overwrite \
            deploy/grug-webhook deploy/grug-api deploy/grug-consumer \
            cronjob/grug-poller \
            "grug.dev/image-source=${IMAGE_SOURCE:?neither image step set IMAGE_SOURCE}" \
            "grug.dev/merge-sha=${GITHUB_SHA}"

      - name: Post-deploy synthetic self-test (#499)
        id: synthetic
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          fail() { echo "::error::synthetic: $1"; exit 1; }
          probe_health() {  # probe_health <svc>
            kubectl -n grug port-forward "svc/$1" 18080:8080 >/dev/null 2>&1 &
            pf=$!
            sleep 3
            for ep in livez readyz; do
              curl -fsS -m 10 "http://127.0.0.1:18080/$ep" > /dev/null \
                || { kill "$pf" 2>/dev/null; fail "$1 /$ep unhealthy"; }
            done
            kill "$pf" 2>/dev/null; wait "$pf" 2>/dev/null || true
          }
          probe_health grug-webhook
          probe_health grug-api
          # Signed ping through the FULL auth stack: proves the pod serves,
          # its Roles Anywhere creds fetch the webhook secret from SSM,
          # HMAC verify runs, and the CF-boundary middleware accepts the
          # shared secret - the #368 proof mechanics, automated and
          # side-effect-free (ping dispatches nothing).
          WH_SECRET=$(aws ssm get-parameter --name /grug/github-app-webhook-secret --with-decryption --query 'Parameter.Value' --output text)
          CF_SECRET=$(aws ssm get-parameter --name /grug/cf-shared-secret --with-decryption --query 'Parameter.Value' --output text)
          kubectl -n grug port-forward svc/grug-webhook 18080:8080 >/dev/null 2>&1 &
          pf=$!
          sleep 3
          BODY='{"zen":"synthetic deploy self-test","hook_id":0}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$WH_SECRET" | awk '{print $NF}')
          code=$(curl -s -o "$RUNNER_TEMP/ping.out" -w '%{http_code}' -m 15 \
            -H "X-GitHub-Event: ping" \
            -H "X-GitHub-Delivery: synthetic-${GITHUB_SHA}" \
            -H "X-Hub-Signature-256: sha256=${SIG}" \
            -H "X-Grug-CF-Secret: ${CF_SECRET}" \
            -H "Content-Type: application/json" \
            --data "$BODY" "http://127.0.0.1:18080/webhook/github")
          kill "$pf" 2>/dev/null; wait "$pf" 2>/dev/null || true
          [ "$code" = "200" ] || fail "signed ping got HTTP $code: $(head -c 120 "$RUNNER_TEMP/ping.out")"
          # 60s soak: no container restarts and both services still ready
          # (the owned stand-in for a DD error-rate window - the deploy
          # role has no DD keys by design; see ADR-0017).
          base=$(kubectl -n grug get pods -o jsonpath='{range .items[*]}{range .status.containerStatuses[*]}{.restartCount}{"\n"}{end}{end}' | awk '{s+=$1} END {print s+0}')
          sleep 60
          after=$(kubectl -n grug get pods -o jsonpath='{range .items[*]}{range .status.containerStatuses[*]}{.restartCount}{"\n"}{end}{end}' | awk '{s+=$1} END {print s+0}')
          [ "$after" -le "$base" ] || fail "container restarts during soak (${base} -> ${after})"
          probe_health grug-webhook
          probe_health grug-api
          echo "synthetic PASS: health x2, signed ping 200, 60s soak clean" >> "$GITHUB_STEP_SUMMARY"

      - name: Auto-rollback to last-good (#499)
        # Fires on ANY post-anchor deploy failure: a failed apply/rollout/
        # smoke OR a failed synthetic. IMAGE-ONLY contract (ADR-0017): the
        # anchor restores the previous digests under the CURRENT applied
        # config - a manifest/secret regression needs revert + redeploy;
        # the step warns when this merge touched k8s/.
        if: steps.apply.outcome == 'failure' || steps.synthetic.outcome == 'failure'
        run: |
          set -euo pipefail
          W=$(kubectl -n grug get configmap grug-last-good -o jsonpath='{.data.webhook}' 2>/dev/null || echo "")
          A=$(kubectl -n grug get configmap grug-last-good -o jsonpath='{.data.api}' 2>/dev/null || echo "")
          if [ -z "$W" ] || [ -z "$A" ]; then
            echo "::error::synthetic FAILED and no last-good anchor exists - manual intervention required"
            exit 1
          fi
          # Restore the pre-seed grug-secrets snapshot FIRST (codex r3):
          # rollback covers images + the one durable object this run
          # mutates; the pods restarted below mount the restored values.
          if [ -s "$RUNNER_TEMP/grug-secrets.pre.json" ]; then
            kubectl -n grug apply -f "$RUNNER_TEMP/grug-secrets.pre.json"
            echo "restored pre-deploy grug-secrets snapshot" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::no grug-secrets snapshot from this run - secret left as seeded"
          fi
          # Container names per the live manifests: webhook/webhook,
          # api/webhook (historical), consumer/consumer, poller/poller.
          kubectl -n grug set image deploy/grug-webhook webhook="$W"
          kubectl -n grug set image deploy/grug-api webhook="$A"
          kubectl -n grug set image deploy/grug-consumer consumer="$W"
          kubectl -n grug set image cronjob/grug-poller poller="$W"
          kubectl -n grug-trial set image cronjob/grug-trial-janitor janitor="$W"
          # Image-bearing ENV vars are pins too (codex r4): the Smasher
          # sandbox job image rides GRUG_SMASHER_JOB_IMAGE on webhook +
          # consumer - set image never touches env.
          kubectl -n grug set env deploy/grug-webhook GRUG_SMASHER_JOB_IMAGE="$W"
          kubectl -n grug set env deploy/grug-consumer GRUG_SMASHER_JOB_IMAGE="$W"
          # set image is a no-op when digests match (a config-only bad
          # deploy) - force pod restarts so the restored secret is
          # actually mounted.
          for d in grug-webhook grug-api grug-consumer; do
            kubectl -n grug rollout restart "deploy/$d"
          done
          for d in grug-webhook grug-api grug-consumer; do
            kubectl -n grug rollout status "deploy/$d" --timeout=180s
          done
          kubectl -n grug annotate --overwrite \
            deploy/grug-webhook deploy/grug-api deploy/grug-consumer cronjob/grug-poller \
            "grug.dev/image-source=rollback-last-good" \
            "grug.dev/rolled-back-from=${GITHUB_SHA}"
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          if [ -n "$NODE_IP" ]; then
            printf 'grug.deploy.rollback:1|c|#env:prod,trigger:synthetic' \
              | timeout 5 bash -c "cat > /dev/udp/${NODE_IP}/8125" || true
          fi
          if git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" | grep -q '^k8s/'; then
            echo "::warning::this merge also changed k8s/ manifests - rollback restored IMAGES ONLY; the applied config may still be bad (ADR-0017 image-only contract). Revert + redeploy if the failure was config-shaped."
          fi
          echo "::error::deploy FAILED (apply or synthetic) - rolled back to last-good images. The bad merge is STILL ON MAIN: revert or fix forward."
          echo "ROLLED BACK to last-good (from $(kubectl -n grug get configmap grug-last-good -o jsonpath='{.data.recorded_from_sha}'))" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Emit deploy telemetry
        if: always() && steps.synthetic.outcome == 'success'
        run: |
          # promoted-vs-rebuilt rate (#498 handoff): owned DogStatsD count
          # via a node's agent hostPort; best-effort.
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "")
          if [ -n "$NODE_IP" ] && [ -n "${IMAGE_SOURCE:-}" ]; then
            src=$(printf '%s' "$IMAGE_SOURCE" | tr -cd 'a-z0-9-' | head -c 40)
            printf 'grug.deploy.completed:1|c|#env:prod,source:%s' "$src" \
              | timeout 5 bash -c "cat > /dev/udp/${NODE_IP}/8125" || true
          fi

      - name: Cleanup
        if: always()
        run: rm -f "$HOME/.kube/config" "$RUNNER_TEMP/grug-secrets.pre.json"
