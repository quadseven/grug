name: Check · image build · services/ Docker context

# Pre-merge proof that BOTH service images build from the ADR-0014 context
# (services/ with _shared/ alongside each service tree) and that their
# import graphs resolve INSIDE the image (PYTHONPATH=/app/_shared).
# Without this gate a broken COPY/PYTHONPATH layout would take down BOTH
# services at the next deploy (#77).
#
# Since #498 (ADR-0016) this gate also BUILDS THE SHIPPABLE ARTIFACT:
# native arm64 (same hosted runner class as deploy.k8s.yml - the cluster is
# arm64, so an x86 smoke image would prove nothing about what ships), and
# for SAME-REPO PRs the smoked images are pushed to the private registry
# tagged pr-<n>; the merge deploy PROMOTES that digest when the ADR-0016
# checks pass (single merged PR, tree-identical, manifests present, baked
# sha verified) - anything else rebuilds, including fork PRs (no secrets
# by GitHub's rules; the smokes still gate) and unseeded credentials.
# Credentials are repo-level CI_* secrets (push-scoped registry credential
# + an ephemeral tag:ci tailnet key that MUST be reusable - the matrix
# joins twice concurrently), NOT the main-only k8s-prod environment;
# trust boundary documented in ADR-0016.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'services/**'
      - '.github/workflows/check.image-build.yml'

# A superseded run finishing LATE must never overwrite pr-<n> with an
# older commit's image (audit stage-5): cancel it. A cancelled mid-push
# leaves the manifest absent and the merge deploy falls back to rebuild.
concurrency:
  group: image-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image-build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    strategy:
      fail-fast: false  # one service's failure must not hide the other's result
      matrix:
        svc: [webhook, api]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Build the PR HEAD bytes, not the default merge ref: promotion
          # verifies the baked DD_GIT_COMMIT_SHA against head.sha, and
          # ADR-0016 rule 2 (head tree == merge tree) is only sound when
          # the artifact IS the head (audit stage-6).
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Build image (services/ context)
        # DD_GIT_COMMIT_SHA = the PR HEAD sha: if this digest is promoted,
        # ADR-0016 rule 3b guarantees the merge tree is identical, so the
        # baked source link stays truthful.
        run: |
          docker build services -f services/Dockerfile \
            --build-arg SERVICE="${{ matrix.svc }}" \
            --build-arg DD_GIT_REPOSITORY_URL="github.com/${{ github.repository }}" \
            --build-arg DD_GIT_COMMIT_SHA="${{ github.event.pull_request.head.sha }}" \
            -t "grug-${{ matrix.svc }}:pr-smoke"
      - name: Import smoke (inside the image)
        run: |
          set -euo pipefail
          if [ "${{ matrix.svc }}" = "webhook" ]; then
            # Includes the LAZY dispatch_path targets (personas.*.dispatch) +
            # rerun: they are deliberately off dispatcher/main's eager import
            # graph, so a broken _shared layout could pass an eager-only smoke
            # and then fail inside every async job at runtime.
            mods="dispatcher, consumer, async_dispatch, hmac_verify, rerun, poller_handler, cave_fallback, adapters.install_store, personas.registry, personas.code_reviewer.dispatch, personas.guard.dispatch, personas.smasher.dispatch, personas.smasher.sandbox, personas.smasher.trial_janitor, personas.smasher.trial_fetch, personas.smasher.trial_deps, personas.smasher.trial_worker, observability, readiness, preview_mode, preview_names, reap_previews, main"
          else
            mods="admin, installations, auth.github_oauth, crypto.kms_envelope, adapters.user_store, adapters.install_store, personas.registry, observability, readiness, preview_mode, preview_names, main"
          fi
          # boto3 clients constructed at import (crypto/kms_envelope.py) need
          # a region; hosted runners/containers have no ambient AWS config -
          # same benign-placeholder pattern check.python.yml uses for the moto suites.
          # The trailing provenance assert (peer review, PR #495) proves the
          # shared modules resolve from /app/_shared INSIDE the image - not a
          # stray in-image copy under /app - so a future Dockerfile COPY
          # mistake cannot silently serve a duplicate.
          docker run --rm \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -e AWS_ACCESS_KEY_ID=smoke -e AWS_SECRET_ACCESS_KEY=smoke \
            "grug-${{ matrix.svc }}:pr-smoke" \
            python -c "import ${mods}; import observability, adapters.install_store as _s; assert '_shared' in observability.__file__ and '_shared' in _s.__file__, (observability.__file__, _s.__file__); print('IMPORTS OK')"
      - name: Boot-proof crash smoke (call site + monitored event)
        run: |
          # Deterministic tripwire branch, zero network (#389 audit): with RA
          # config AND static env creds, main's import-time proof must refuse
          # to boot AND emit the monitored event. Pins the call site the unit
          # suite structurally cannot (import happens at collection) and the
          # event name half the DD monitor keys on.
          set +e
          out=$(docker run --rm \
            -e AWS_CONFIG_FILE=/etc/grug-aws/config \
            -e AWS_ACCESS_KEY_ID=x -e AWS_SECRET_ACCESS_KEY=x \
            -e AWS_DEFAULT_REGION=us-east-1 \
            "grug-${{ matrix.svc }}:pr-smoke" python -c "import main" 2>&1)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::boot proof did NOT refuse static creds + RA config"; exit 1
          fi
          echo "$out" | grep -q "static AWS creds present" || {
            echo "::error::wrong failure mode (expected the static-creds refusal)"; echo "$out" | tail -5; exit 1
          }
          echo "$out" | grep -q "roles_anywhere_identity_failed" || {
            echo "::error::monitored event missing from boot failure output"; echo "$out" | tail -5; exit 1
          }
      - name: Signing-helper exec smoke (runtime ABI)
        run: |
          # The helper is cgo-linked against the BUILDER's glibc; exec it in
          # the RUNTIME image so a base-image (Debian release) drift between
          # the two stages fails here, not in a pod (#388; both images since
          # the #389 rollout).
          docker run --rm "grug-${{ matrix.svc }}:pr-smoke" aws_signing_helper version

      # --- #498 (ADR-0016): publish the smoked artifact for promotion ---
      # Push happens ONLY after every smoke above passed, and only when the
      # promotion credentials are actually usable: fork PRs (no secrets by
      # GitHub's rules) and unseeded CI_* secrets both skip EVERY promotion
      # step - including the tailnet join, which would otherwise hard-fail
      # the whole gate on an empty authkey (audit stage-2).
      - name: Check promotion seeding
        id: seeding
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          CI_REGISTRY_USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
          CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
          CI_TS_AUTHKEY: ${{ secrets.CI_TS_AUTHKEY }}
        run: |
          if [ -n "$REGISTRY_HOST" ] && [ -n "$CI_REGISTRY_USERNAME" ] \
             && [ -n "$CI_REGISTRY_PASSWORD" ] && [ -n "$CI_TS_AUTHKEY" ]; then
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "seeded=false" >> "$GITHUB_OUTPUT"
            echo "::warning::promotion push skipped - CI_* secrets/vars not fully seeded; merge will rebuild"
            echo "promotion artifact NOT published (CI_* seeding incomplete) - merge will rebuild" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fork-PR notice
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: echo "fork PR - promotion artifacts not published by design; merge will rebuild" >> "$GITHUB_STEP_SUMMARY"

      - name: Join tailnet (ephemeral)
        if: steps.seeding.outputs.seeded == 'true'
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          # Reusable key on purpose: both matrix legs join concurrently.
          authkey: ${{ secrets.CI_TS_AUTHKEY }}
          tags: tag:ci
          use-cache: 'true'

      - name: Push pr-tagged image
        if: steps.seeding.outputs.seeded == 'true'
        env:
          REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
          CI_REGISTRY_USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
          CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "$CI_REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" \
            --username "$CI_REGISTRY_USERNAME" --password-stdin
          docker tag "grug-${{ matrix.svc }}:pr-smoke" \
            "$REGISTRY_HOST/grug-${{ matrix.svc }}:pr-${PR_NUMBER}"
          docker push "$REGISTRY_HOST/grug-${{ matrix.svc }}:pr-${PR_NUMBER}"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' \
            "$REGISTRY_HOST/grug-${{ matrix.svc }}:pr-${PR_NUMBER}")"
          echo "pushed ${digest} (built from head ${HEAD_SHA})" >> "$GITHUB_STEP_SUMMARY"
