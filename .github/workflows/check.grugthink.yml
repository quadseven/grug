# grugthink test gate. Until now nothing ran the grugthink suite on PRs; this
# gates the pgvector memory backend (docs/pgvector-memory.md) against a REAL
# pgvector Postgres, because the store's semantics -- ON CONFLICT dedup, cosine
# `<=>` ordering, namespace/server isolation -- are exactly what a fake gets
# wrong. The service image is pgvector/pgvector:pg18 (stock postgres has no
# `vector` extension). Scope is the new-backend tests, which import via the
# `src.grugthink` convention and collect cleanly; the broader legacy suite has a
# pre-existing import-path inconsistency and is out of scope here.
name: check.grugthink

on:
  pull_request:
    paths:
      - 'grugthink/**'
      - '.github/workflows/check.grugthink.yml'
  push:
    branches: [main]
    paths:
      - 'grugthink/**'

permissions:
  contents: read

jobs:
  memory-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: grugthink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      GRUGTHINK_TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/grugthink_test
    defaults:
      run:
        working-directory: grugthink
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: pgvector memory tests (real pgvector Postgres)
        run: PYTHONPATH=. python -m pytest tests/test_pgvector_store.py tests/test_ollama_embedder.py -v
