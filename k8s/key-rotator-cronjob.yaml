# Interim AWS key-rotator (#386). Throwaway until Roles Anywhere
# (#388/#389). Rotates the grug-k8s-pod access key every 12h: mint new ->
# swap into grug-secrets -> roll the consumers -> delete old. Authenticates
# to AWS with the SEPARATE grug-rotator-secret (scoped to access-key ops on
# the pod user only) - NEVER grug-secrets, which it is mutating.
#
# This is the ONLY workload in the namespace with Kubernetes API access
# (automountServiceAccountToken: true) - a deliberate, documented exception,
# narrowly scoped by the Role below to exactly the one Secret and the three
# Deployments it must touch.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grug-key-rotator
  namespace: grug
automountServiceAccountToken: false  # mounted explicitly on the Job pod only
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grug-key-rotator
  namespace: grug
rules:
  # Read + merge-patch ONLY the grug-secrets Secret (the pod credential).
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [grug-secrets]
    verbs: [get, patch]
  # Rollout-restart + read status of ONLY the three consuming Deployments.
  - apiGroups: [apps]
    resources: [deployments]
    resourceNames: [grug-api, grug-webhook, grug-consumer]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grug-key-rotator
  namespace: grug
subjects:
  - kind: ServiceAccount
    name: grug-key-rotator
    namespace: grug
roleRef:
  kind: Role
  name: grug-key-rotator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: grug-key-rotator
  namespace: grug
  labels: {app: grug-key-rotator}
spec:
  # Every 12h (audit #6 interim). Bounded exposure window for the static key.
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: grug-key-rotator
            tags.datadoghq.com/service: grug-key-rotator
            tags.datadoghq.com/env: prod
        spec:
          restartPolicy: Never
          serviceAccountName: grug-key-rotator
          # The ONE workload that needs the k8s API (patch Secret + roll
          # Deployments). Scoped by the Role above.
          automountServiceAccountToken: true
          nodeSelector:
            kubernetes.io/arch: arm64
          imagePullSecrets:
            - name: registry-pull
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile: {type: RuntimeDefault}
          containers:
            - name: key-rotator
              image: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER
              imagePullPolicy: Always
              command: ["ddtrace-run", "python", "-m", "key_rotator"]
              # AWS creds = the ROTATOR's own key (NOT grug-secrets, which is
              # being rotated). Scoped to access-key ops on grug-k8s-pod only.
              envFrom:
                - secretRef: {name: grug-rotator-secret}
              env:
                - {name: DD_SERVICE, value: grug-key-rotator}
                - {name: DD_ENV, value: prod}
                - name: DD_VERSION
                  value: TAG_PLACEHOLDER
                - name: DD_AGENT_HOST
                  valueFrom: {fieldRef: {fieldPath: status.hostIP}}
                - {name: DD_SITE, value: datadoghq.com}
                - {name: DD_LOGS_INJECTION, value: "true"}
                - {name: GRUG_ENV, value: prod}
                - {name: GRUG_ROTATE_USER, value: grug-k8s-pod}
                - {name: GRUG_ROTATE_SECRET, value: grug-secrets}
                - {name: GRUG_ROTATE_DEPLOYMENTS, value: "grug-api,grug-webhook,grug-consumer"}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: [ALL]}
              volumeMounts:
                - {name: tmp, mountPath: /tmp}
              resources:
                requests: {cpu: 50m, memory: 128Mi}
                limits: {memory: 256Mi}
          volumes:
            - {name: tmp, emptyDir: {}}
