# grug-consumer on Kubernetes (#368): replaces the two SQS->Lambda
# event-source mappings (grug-rerun-jobs.fifo + grug-cave-results.fifo)
# with a long-polling consumer process (services/webhook/consumer.py).
# Same image as the webhook - the consumer runs normal durable Elder reviews
# as well as explicit reruns, so it needs the identical dependency graph and
# SSM env surface.
# Image registry + tag are PLACEHOLDERS rewritten by the deploy workflow.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grug-consumer
  namespace: grug
  labels:
    app: grug-consumer
    tags.datadoghq.com/service: grug-consumer
    tags.datadoghq.com/env: prod
spec:
  # One pod with a bounded in-process rerun worker pool. FIFO message groups
  # preserve per-PR ordering while unrelated reviews and /grug ask jobs run in
  # parallel; the watchdog restarts the pod if any worker dies.
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: grug-consumer}
  template:
    metadata:
      labels:
        app: grug-consumer
        tags.datadoghq.com/service: grug-consumer
        tags.datadoghq.com/env: prod
    spec:
      # The consumer runs the rerun lane, which re-drives Smasher (#469) and so
      # can LAUNCH a Trial Job - it mounts the same launcher SA as the webhook,
      # whose permissions are confined to the secret-free `grug-trial` namespace
      # (k8s/smasher-trial-namespace.yaml + ADR-0013) with none in `grug`.
      serviceAccountName: grug-smasher-launcher
      automountServiceAccountToken: true
      # 60s (default 30): shutdown budget = 15s shared thread-join + the
      # orphaned-claim release sweep (#607). The sweep MUST complete before
      # SIGKILL or a killed Elder review's claim bounces redeliveries off
      # "claim busy" while the PR waits on its REQUIRED check (grug#515).
      terminationGracePeriodSeconds: 60
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: registry-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: consumer
          image: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER
          imagePullPolicy: Always
          command: ["ddtrace-run", "python", "consumer.py"]
          envFrom:
            - secretRef: {name: grug-secrets}
            # Roles Anywhere ONLY (#389 retirement): the static key and its
            # reserve Secret no longer exist. Recovery from a broken cert
            # path = revert the retirement PR (restores the Pulumi user/key
            # + seed), redeploy, then flip this workload back to env creds
            # (RUNBOOK 'Rollback / recovery (post-retirement)').
          env:
            - {name: AWS_CONFIG_FILE, value: /etc/grug-aws/config}
            - {name: GRUG_RA_ROLE_ARN, value: RA_ROLE_ARN_PLACEHOLDER}
            - {name: DD_SERVICE, value: grug-consumer}
            - {name: DD_ENV, value: prod}
            - name: DD_VERSION
              value: TAG_PLACEHOLDER
            - name: DD_AGENT_HOST
              valueFrom: {fieldRef: {fieldPath: status.hostIP}}
            - {name: DD_LOGS_INJECTION, value: "true"}
            # Bound how long the main-thread tracer.flush() (#412) can block
            # when the trace agent is unreachable, so it can't stall the
            # dead-thread watchdog beyond ~2s (measured default ~1.5s; pin it
            # so a ddtrace default change can't regress watchdog responsiveness).
            - {name: DD_TRACE_AGENT_TIMEOUT_SECONDS, value: "2"}
            - {name: GRUG_ENV, value: prod}
            - {name: GITHUB_APP_ID_SSM, value: /grug/github-app-id}
            - {name: GITHUB_APP_PRIVATE_KEY_SSM, value: /grug/github-app-private-key}
            - {name: GITHUB_APP_WEBHOOK_SECRET_SSM, value: /grug/github-app-webhook-secret}
            - {name: GITHUB_APP_CLIENT_ID_SSM, value: /grug/github-app-client-id}
            - {name: GITHUB_APP_CLIENT_SECRET_SSM, value: /grug/github-app-client-secret}
            - {name: GRUG_CF_SHARED_SECRET_SSM, value: /grug/cf-shared-secret}
            - {name: GRUG_OPENROUTER_API_KEY_SSM, value: /infra/llm/openrouter_api_key}
            - {name: GRUG_POOLSIDE_API_KEY_SSM, value: /infra/llm/poolside_api_key}
            - {name: GRUG_PROMPT_EXPERIMENT_SSM, value: /grug/elder-prompt-experiment}
            # Production Elder runs both review backends and merges their
            # findings. Opus is scoped to the OpenRouter REVIEW pass only.
            # Set GRUG_REVIEW_DEPTH=fast on both deployments for the immediate
            # one-primary-plus-fallback latency/cost rollback.
            - {name: GRUG_REVIEW_DEPTH, value: deep}
            - {name: GRUG_OPENROUTER_REVIEW_MODEL, value: anthropic/claude-opus-4.7}
            # Apex: more concurrent durable reviews so a busy multi-repo
            # night does not serialize Elder behind unrelated large PRs.
            - {name: GRUG_RERUN_WORKERS, value: "6"}
            # Absolute per-review wall clock. The watchdog returns the SQS
            # receipt, releases the snapshot claim, and replaces the process
            # if a live worker exceeds this budget. Keep below SQS's 900s
            # fallback visibility so cleanup retains operational headroom.
            # 800 (not 720): reserves ~140s of slack ahead of the Cave arms'
            # own 660s worst case (2 x 330, see GRUG_REVIEW_LLM_TIMEOUT_S
            # below) for the OpenRouter/Poolside overload fallback
            # (2026-07-14) - two single-shot 40s attempts
            # (llm_client._SAAS_OVERLOAD_FALLBACK_TIMEOUT_SECONDS) plus
            # parsing/logging overhead, still 100s under the 900s SQS lease.
            - {name: GRUG_REVIEW_JOB_TIMEOUT_S, value: "800"}
            # Per-arm LLM transport timeout for the deep review ensemble. Must
            # satisfy 2 x this + ~80s (SaaS fallback worst case) <=
            # GRUG_REVIEW_JOB_TIMEOUT_S (the two arms run sequentially):
            # 2 x 330 = 660, +80 = 740 <= 800. The old 150s default made
            # every big-diff review degrade to all_failed - a large-diff
            # reasoner pass was measured at ~318s live (2026-07-13).
            - {name: GRUG_REVIEW_LLM_TIMEOUT_S, value: "330"}
            # Four handlers plus their short claim-renewal heartbeats may touch
            # Postgres concurrently; keep pool headroom above the worker count.
            - {name: GRUG_PG_POOL_MAX, value: "10"}
            # In-cluster spark-gateway for the exposed-secret judge (#439,
            # ADR-0009). Non-secret Service DNS (named in the ADR); unset =
            # feature off, SaaS judge as before (fail-open).
            - {name: GRUG_CAVE_GATEWAY_URL, value: http://spark-gateway.spark-gateway.svc:8080}
            - {name: GRUG_CAVE_JUDGE_MODEL, value: qwen3-coder-next:q8_0}
            # Review ensemble arms (#593). Coder = qwen3-coder-next on sparkles;
            # reasoner = qwen3.5, permanently resident on sparkicus ollama (the
            # nemotron vLLM was retired 2026-07-12 - pointing at it made every
            # Elder review cold-load 87GB on a Spark and time out). Tags are
            # PINNED: a bare :latest resolves to a tag the Sparks don't carry.
            - {name: GRUG_CAVE_REVIEW_MODEL, value: qwen3-coder-next:q8_0}
            - {name: GRUG_CAVE_REASONER_MODEL, value: qwen3.5:122b}
            # Omen production-signal fusion (#470). All three fail-open:
            # absent params/mapping = zero DD calls = today's review.
            - {name: GRUG_DD_API_KEY_SSM, value: /grug/dd-api-key}
            - {name: GRUG_DD_APP_KEY_SSM, value: /grug/dd-app-key}
            - {name: GRUG_OMEN_SERVICE_MAP_SSM, value: /grug/omen-service-map}
            - {name: GRUG_FALLBACK_ENABLED_SSM, value: /grug/elder-fallback-enabled}
            # SAST detection engine (#401): Semgrep OSS over the vendored
            # offline rules - the consumer runs full Elder re-runs, so it needs
            # the same engine as the webhook. The semgrep CLI ships in the image.
            - {name: GRUG_SAST_ENGINE, value: semgrep}
            # Smasher Trial (#469): the consumer re-drives Smasher on the rerun
            # lane, so it needs the same master flag + Job image as the webhook.
            - {name: GRUG_SMASHER_ENABLED_SSM, value: /grug/smasher-enabled}
            - {name: GRUG_SMASHER_NETPOL_ENFORCED_SSM, value: /grug/smasher-network-policy-enforced}
            - {name: GRUG_SMASHER_JOB_IMAGE, value: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER}
            - {name: DD_SITE, value: datadoghq.com}
            - {name: DD_LLMOBS_ENABLED, value: "true"}
            - {name: DD_LLMOBS_ML_APP, value: grug-elder}
          # No HTTP surface -> no http probes. Liveness = the python
          # process itself; if a consumer thread dies the process exits
          # (thread join in main) and the kubelet restarts the pod.
          resources:
            # Four network-heavy review workers share this process. Leave room
            # for concurrent prompts and occasional Semgrep reruns without an
            # OOM restart halfway through a leased review.
            requests: {cpu: 100m, memory: 256Mi}
            limits: {memory: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            # Roles Anywhere credential path (#389 - the #388 tracer wiring).
            - {name: grug-pki, mountPath: /var/run/grug-pki, readOnly: true}
            - {name: aws-config, mountPath: /etc/grug-aws, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: grug-pki
          secret:
            secretName: grug-pki-tls
        - name: aws-config
          configMap:
            name: grug-aws-config
        - name: tmp
          emptyDir: {sizeLimit: 64Mi}
