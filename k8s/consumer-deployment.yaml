# grug-consumer on Kubernetes (#368): replaces the two SQS->Lambda
# event-source mappings (grug-rerun-jobs.fifo + grug-cave-results.fifo)
# with a long-polling consumer process (services/webhook/consumer.py).
# Same image as the webhook - the rerun handler runs full Elder re-runs,
# so it needs the identical dependency graph and SSM env surface.
# Image registry + tag are PLACEHOLDERS rewritten by the deploy workflow.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grug-consumer
  namespace: grug
  labels:
    app: grug-consumer
    tags.datadoghq.com/service: grug-consumer
    tags.datadoghq.com/env: prod
spec:
  # ONE replica, deliberately: batch-size-1 consumption from FIFO queues -
  # a second replica would interleave message groups and double Elder
  # re-run load for zero benefit at grug's volume.
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: grug-consumer}
  template:
    metadata:
      labels:
        app: grug-consumer
        tags.datadoghq.com/service: grug-consumer
        tags.datadoghq.com/env: prod
    spec:
      # The consumer runs the rerun lane, which re-drives Smasher (#469) and so
      # can LAUNCH a Trial Job - it mounts the same launcher SA as the webhook,
      # whose permissions are confined to the secret-free `grug-trial` namespace
      # (k8s/smasher-trial-namespace.yaml + ADR-0013) with none in `grug`.
      serviceAccountName: grug-smasher-launcher
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: registry-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: consumer
          image: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER
          imagePullPolicy: Always
          command: ["ddtrace-run", "python", "consumer.py"]
          envFrom:
            - secretRef: {name: grug-secrets}
            # #389: static key DROPPED from this workload - it now rides the
            # Roles Anywhere cert path. The grug-aws-static-key Secret stays
            # live (rotator-maintained) as the ROLLBACK RESERVE until the
            # retirement PR deletes it; re-adding this envFrom + removing
            # AWS_CONFIG_FILE (env below) is the documented rollback.
          env:
            - {name: AWS_CONFIG_FILE, value: /etc/grug-aws/config}
            - {name: GRUG_RA_ROLE_ARN, value: RA_ROLE_ARN_PLACEHOLDER}
            - {name: DD_SERVICE, value: grug-consumer}
            - {name: DD_ENV, value: prod}
            - name: DD_VERSION
              value: TAG_PLACEHOLDER
            - name: DD_AGENT_HOST
              valueFrom: {fieldRef: {fieldPath: status.hostIP}}
            - {name: DD_LOGS_INJECTION, value: "true"}
            # Bound how long the main-thread tracer.flush() (#412) can block
            # when the trace agent is unreachable, so it can't stall the
            # dead-thread watchdog beyond ~2s (measured default ~1.5s; pin it
            # so a ddtrace default change can't regress watchdog responsiveness).
            - {name: DD_TRACE_AGENT_TIMEOUT_SECONDS, value: "2"}
            - {name: GRUG_ENV, value: prod}
            - {name: GITHUB_APP_ID_SSM, value: /grug/github-app-id}
            - {name: GITHUB_APP_PRIVATE_KEY_SSM, value: /grug/github-app-private-key}
            - {name: GITHUB_APP_WEBHOOK_SECRET_SSM, value: /grug/github-app-webhook-secret}
            - {name: GITHUB_APP_CLIENT_ID_SSM, value: /grug/github-app-client-id}
            - {name: GITHUB_APP_CLIENT_SECRET_SSM, value: /grug/github-app-client-secret}
            - {name: GRUG_CF_SHARED_SECRET_SSM, value: /grug/cf-shared-secret}
            - {name: GRUG_OPENROUTER_API_KEY_SSM, value: /infra/llm/openrouter_api_key}
            - {name: GRUG_POOLSIDE_API_KEY_SSM, value: /infra/llm/poolside_api_key}
            - {name: GRUG_PROMPT_EXPERIMENT_SSM, value: /grug/elder-prompt-experiment}
            # In-cluster spark-gateway for the exposed-secret judge (#439,
            # ADR-0009). Non-secret Service DNS (named in the ADR); unset =
            # feature off, SaaS judge as before (fail-open).
            - {name: GRUG_CAVE_GATEWAY_URL, value: http://spark-gateway.spark-gateway.svc:8080}
            - {name: GRUG_CAVE_JUDGE_MODEL, value: qwen3-coder-next:latest}
            # Omen production-signal fusion (#470). All three fail-open:
            # absent params/mapping = zero DD calls = today's review.
            - {name: GRUG_DD_API_KEY_SSM, value: /grug/dd-api-key}
            - {name: GRUG_DD_APP_KEY_SSM, value: /grug/dd-app-key}
            - {name: GRUG_OMEN_SERVICE_MAP_SSM, value: /grug/omen-service-map}
            - {name: GRUG_FALLBACK_ENABLED_SSM, value: /grug/elder-fallback-enabled}
            # SAST detection engine (#401): Semgrep OSS over the vendored
            # offline rules - the consumer runs full Elder re-runs, so it needs
            # the same engine as the webhook. The semgrep CLI ships in the image.
            - {name: GRUG_SAST_ENGINE, value: semgrep}
            # Smasher Trial (#469): the consumer re-drives Smasher on the rerun
            # lane, so it needs the same master flag + Job image as the webhook.
            - {name: GRUG_SMASHER_ENABLED_SSM, value: /grug/smasher-enabled}
            - {name: GRUG_SMASHER_NETPOL_ENFORCED_SSM, value: /grug/smasher-network-policy-enforced}
            - {name: GRUG_SMASHER_JOB_IMAGE, value: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER}
            - {name: DD_SITE, value: datadoghq.com}
            - {name: DD_LLMOBS_ENABLED, value: "true"}
            - {name: DD_LLMOBS_ML_APP, value: grug-elder}
          # No HTTP surface -> no http probes. Liveness = the python
          # process itself; if a consumer thread dies the process exits
          # (thread join in main) and the kubelet restarts the pod.
          resources:
            requests: {cpu: 50m, memory: 192Mi}
            limits: {memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            # Roles Anywhere credential path (#389 - the #388 tracer wiring).
            - {name: grug-pki, mountPath: /var/run/grug-pki, readOnly: true}
            - {name: aws-config, mountPath: /etc/grug-aws, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: grug-pki
          secret:
            secretName: grug-pki-tls
        - name: aws-config
          configMap:
            name: grug-aws-config
        - name: tmp
          emptyDir: {sizeLimit: 64Mi}
