# Preview namespace for PR <n> (#500, ADR-0018). PREVIEW_ placeholders are
# sed-substituted by preview.yml at deploy time. Resource-capped so a
# preview cannot starve prod on the 4-node cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: PREVIEW_NS
  labels: {app: grug-preview, grug.dev/preview-pr: "PREVIEW_PR"}
---
apiVersion: v1
kind: ResourceQuota
metadata: {name: preview-quota, namespace: PREVIEW_NS}
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 512Mi
    limits.cpu: "1"
    limits.memory: 1Gi
    pods: "4"
---
apiVersion: v1
kind: LimitRange
metadata: {name: preview-limits, namespace: PREVIEW_NS}
spec:
  limits:
    - type: Container
      default: {cpu: 250m, memory: 256Mi}
      defaultRequest: {cpu: 100m, memory: 128Mi}
---
# Deny-all ingress except within the namespace; egress to DNS + the
# shared Postgres + HTTPS. A preview never needs prod-namespace access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: preview-isolation, namespace: PREVIEW_NS}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {}}]
  egress:
    - to: [{podSelector: {}}]
    - ports:  # DNS
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    - ports:  # Postgres (shared CNPG) + HTTPS
        - {protocol: TCP, port: 5432}
        - {protocol: TCP, port: 443}
