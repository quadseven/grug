# grug-webhook on Kubernetes (#354). Image registry + tag are PLACEHOLDERS
# rewritten by the deploy workflow (sed from repository variables) - no
# registry host is committed to this public repo by design.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grug-webhook
  namespace: grug
  labels:
    app: grug-webhook
    tags.datadoghq.com/service: grug-webhook
    tags.datadoghq.com/env: prod
spec:
  replicas: 1
  # RollingUpdate with maxUnavailable:0 so the dependency-aware /readyz (#404)
  # actually self-limits a bad deploy: the new pod must pass readiness before
  # the serving pod is removed, so a dep-broken rollout stalls on the last-good
  # pod instead of going to zero replicas (which Recreate would do).
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app: grug-webhook}
  template:
    metadata:
      labels:
        app: grug-webhook
        tags.datadoghq.com/service: grug-webhook
        tags.datadoghq.com/env: prod
    spec:
      # The webhook runs the async Smasher Trial (#469), which LAUNCHES a
      # locked-down Job via the in-cluster k8s API - so it mounts the launcher
      # SA token. That token's PERMISSIONS are confined to the dedicated,
      # secret-free `grug-trial` namespace (jobs + pods + per-Job token secret;
      # k8s/smasher-trial-namespace.yaml + ADR-0013) and it has ZERO permissions
      # in this `grug` namespace - so a webhook compromise cannot use it to
      # reach grug-secrets. The token is mounted on every deploy (not gated by
      # the default-OFF feature flag), which is why its blast radius is bounded
      # by the grug-trial namespace isolation rather than by the flag.
      serviceAccountName: grug-smasher-launcher
      automountServiceAccountToken: true
      # Images are built natively for arm64 only - without this pin a
      # mixed-arch cluster schedules onto amd64 and exec-format-errors
      # (review F2).
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: registry-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: webhook
          image: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - {name: http, containerPort: 8080}
          envFrom:
            - secretRef: {name: grug-secrets}
            # Roles Anywhere ONLY (#389 retirement): the static key and its
            # reserve Secret no longer exist. Recovery from a broken cert
            # path = revert the retirement PR (restores the Pulumi user/key
            # + seed), redeploy, then flip this workload back to env creds
            # (RUNBOOK 'Rollback / recovery (post-retirement)').
          env:
            - {name: AWS_CONFIG_FILE, value: /etc/grug-aws/config}
            - {name: GRUG_RA_ROLE_ARN, value: RA_ROLE_ARN_PLACEHOLDER}
            - {name: DD_SERVICE, value: grug-webhook}
            - {name: DD_ENV, value: prod}
            - name: DD_VERSION
              value: TAG_PLACEHOLDER
            - name: DD_AGENT_HOST
              valueFrom: {fieldRef: {fieldPath: status.hostIP}}
            - {name: DD_LOGS_INJECTION, value: "true"}
            - {name: GRUG_ENV, value: prod}
            # Off-Lambda async path (#368). Elder's production hot path is
            # durable SQS below; this flag still enables the local worker used
            # by the other async personas and by Elder only if that lane is
            # deliberately disabled.
            - {name: GRUG_K8S_RUNTIME, value: "1"}
            # Durable Elder hot path: stamp each webhook head onto the existing
            # rerun FIFO, then let the consumer require N seconds of head
            # stability before spending the deep-review budget. A moved head
            # is stale and cancelled; its newer webhook event owns the next
            # message. Raised 90 -> 180 (2026-07-15): per-PR reviews are
            # strictly ordered (SQS FIFO MessageGroupId = one PR), so an
            # iterative fixup-commit cadence (a push every 2-4 min while
            # responding to review comments) was outrunning the old 90s
            # window often enough that most of those pushes still paid the
            # full ~330-660s Elder budget only to be superseded moments
            # later. 180s is still well under the 300s hard clamp
            # (_MAX_SETTLE_SECONDS in rerun.py) and the SQS visibility/lease
            # budget has ample room.
            - {name: GRUG_ELDER_DURABLE_QUEUE, value: "1"}
            - {name: GRUG_ELDER_SETTLE_SECONDS, value: "180"}
            # Keep review configuration on both Elder-capable workloads. The
            # Opus override is review-only; judge, Teller, and /grug ask retain
            # their existing lower-cost OpenRouter model configuration.
            - {name: GRUG_REVIEW_DEPTH, value: deep}
            - {name: GRUG_OPENROUTER_REVIEW_MODEL, value: anthropic/claude-opus-4.7}
            - {name: GITHUB_APP_ID_SSM, value: /grug/github-app-id}
            - {name: GITHUB_APP_PRIVATE_KEY_SSM, value: /grug/github-app-private-key}
            - {name: GITHUB_APP_WEBHOOK_SECRET_SSM, value: /grug/github-app-webhook-secret}
            - {name: GITHUB_APP_CLIENT_ID_SSM, value: /grug/github-app-client-id}
            - {name: GITHUB_APP_CLIENT_SECRET_SSM, value: /grug/github-app-client-secret}
            - {name: GRUG_CF_SHARED_SECRET_SSM, value: /grug/cf-shared-secret}
            - {name: GRUG_OPENROUTER_API_KEY_SSM, value: /infra/llm/openrouter_api_key}
            - {name: GRUG_POOLSIDE_API_KEY_SSM, value: /infra/llm/poolside_api_key}
            - {name: GRUG_PROMPT_EXPERIMENT_SSM, value: /grug/elder-prompt-experiment}
            # In-cluster spark-gateway for the exposed-secret judge (#439,
            # ADR-0009). Non-secret Service DNS (named in the ADR); unset =
            # feature off, SaaS judge as before (fail-open).
            - {name: GRUG_CAVE_GATEWAY_URL, value: http://spark-gateway.spark-gateway.svc:8080}
            - {name: GRUG_CAVE_JUDGE_MODEL, value: qwen3-coder-next:q8_0}
            # Review ensemble arms (#593). Coder = qwen3-coder-next on sparkles;
            # reasoner = qwen3.5, permanently resident on sparkicus ollama (the
            # nemotron vLLM was retired 2026-07-12 - pointing at it made every
            # Elder review cold-load 87GB on a Spark and time out). Tags are
            # PINNED: a bare :latest resolves to a tag the Sparks don't carry.
            - {name: GRUG_CAVE_REVIEW_MODEL, value: qwen3-coder-next:q8_0}
            - {name: GRUG_CAVE_REASONER_MODEL, value: qwen3.5:122b}
            # Omen production-signal fusion (#470). All three fail-open:
            # absent params/mapping = zero DD calls = today's review.
            - {name: GRUG_DD_API_KEY_SSM, value: /grug/dd-api-key}
            - {name: GRUG_DD_APP_KEY_SSM, value: /grug/dd-app-key}
            - {name: GRUG_OMEN_SERVICE_MAP_SSM, value: /grug/omen-service-map}
            - {name: GRUG_FALLBACK_ENABLED_SSM, value: /grug/elder-fallback-enabled}
            # SAST detection engine (#401): Semgrep OSS over the vendored
            # offline rules. Default off (builtin) elsewhere; on for the review
            # workloads (webhook + consumer). The semgrep CLI ships in the image.
            - {name: GRUG_SAST_ENGINE, value: semgrep}
            # Smasher Trial (#469): global master kill switch (default OFF - the
            # SSM param is absent/false until the operator opts in) + the image
            # the sandbox Job runs (the SAME webhook image, so personas.smasher
            # is importable inside the Job). The registry placeholder is pinned
            # by the deploy workflow, same as the container image above.
            - {name: GRUG_SMASHER_ENABLED_SSM, value: /grug/smasher-enabled}
            # Fail-closed egress gate: Smasher refuses to run author code unless
            # the operator affirms a policy-enforcing CNI here (default off).
            - {name: GRUG_SMASHER_NETPOL_ENFORCED_SSM, value: /grug/smasher-network-policy-enforced}
            - {name: GRUG_SMASHER_JOB_IMAGE, value: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER}
            - {name: DD_SITE, value: datadoghq.com}
            - {name: DD_LLMOBS_ENABLED, value: "true"}
            - {name: DD_LLMOBS_ML_APP, value: grug-elder}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            periodSeconds: 10
            # /readyz now does a (TTL-cached) SSM/KMS + Postgres probe (#404);
            # give the cache-miss request headroom over the 1s default and let
            # a transient blip flap a few times before marking not-ready.
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /livez, port: http}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: {cpu: 50m, memory: 192Mi}
            limits: {memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            # Roles Anywhere credential path (#389 - the #388 tracer wiring).
            - {name: grug-pki, mountPath: /var/run/grug-pki, readOnly: true}
            - {name: aws-config, mountPath: /etc/grug-aws, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: grug-pki
          secret:
            secretName: grug-pki-tls
        - name: aws-config
          configMap:
            name: grug-aws-config
        - name: tmp
          emptyDir: {sizeLimit: 64Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: grug-webhook
  namespace: grug
  labels: {app: grug-webhook}
spec:
  selector: {app: grug-webhook}
  ports:
    - {name: http, port: 8080, targetPort: http}
