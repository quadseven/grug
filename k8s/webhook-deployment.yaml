# grug-webhook on Kubernetes (#354). Image registry + tag are PLACEHOLDERS
# rewritten by the deploy workflow (sed from repository variables) - no
# registry host is committed to this public repo by design.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grug-webhook
  namespace: grug
  labels:
    app: grug-webhook
    tags.datadoghq.com/service: grug-webhook
    tags.datadoghq.com/env: prod
spec:
  replicas: 1
  # RollingUpdate with maxUnavailable:0 so the dependency-aware /readyz (#404)
  # actually self-limits a bad deploy: the new pod must pass readiness before
  # the serving pod is removed, so a dep-broken rollout stalls on the last-good
  # pod instead of going to zero replicas (which Recreate would do).
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app: grug-webhook}
  template:
    metadata:
      labels:
        app: grug-webhook
        tags.datadoghq.com/service: grug-webhook
        tags.datadoghq.com/env: prod
    spec:
      automountServiceAccountToken: false
      # Images are built natively for arm64 only - without this pin a
      # mixed-arch cluster schedules onto amd64 and exec-format-errors
      # (review F2).
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: registry-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: webhook
          image: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - {name: http, containerPort: 8080}
          envFrom:
            - secretRef: {name: grug-secrets}
          env:
            - {name: DD_SERVICE, value: grug-webhook}
            - {name: DD_ENV, value: prod}
            - name: DD_VERSION
              value: TAG_PLACEHOLDER
            - name: DD_AGENT_HOST
              valueFrom: {fieldRef: {fieldPath: status.hostIP}}
            - {name: DD_LOGS_INJECTION, value: "true"}
            - {name: GRUG_ENV, value: prod}
            # Off-Lambda Elder path (#368): run reviews on an in-process
            # background thread instead of the Lambda self-invoke.
            - {name: GRUG_K8S_RUNTIME, value: "1"}
            - {name: GITHUB_APP_ID_SSM, value: /grug/github-app-id}
            - {name: GITHUB_APP_PRIVATE_KEY_SSM, value: /grug/github-app-private-key}
            - {name: GITHUB_APP_WEBHOOK_SECRET_SSM, value: /grug/github-app-webhook-secret}
            - {name: GITHUB_APP_CLIENT_ID_SSM, value: /grug/github-app-client-id}
            - {name: GITHUB_APP_CLIENT_SECRET_SSM, value: /grug/github-app-client-secret}
            - {name: GRUG_CF_SHARED_SECRET_SSM, value: /grug/cf-shared-secret}
            - {name: GRUG_OPENROUTER_API_KEY_SSM, value: /infra/llm/openrouter_api_key}
            - {name: GRUG_POOLSIDE_API_KEY_SSM, value: /infra/llm/poolside_api_key}
            - {name: GRUG_PROMPT_EXPERIMENT_SSM, value: /grug/elder-prompt-experiment}
            - {name: GRUG_FALLBACK_ENABLED_SSM, value: /grug/elder-fallback-enabled}
            # SAST detection engine (#401): Semgrep OSS over the vendored
            # offline rules. Default off (builtin) elsewhere; on for the review
            # workloads (webhook + consumer). The semgrep CLI ships in the image.
            - {name: GRUG_SAST_ENGINE, value: semgrep}
            - {name: DD_SITE, value: datadoghq.com}
            - {name: DD_LLMOBS_ENABLED, value: "true"}
            - {name: DD_LLMOBS_ML_APP, value: grug-elder}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            periodSeconds: 10
            # /readyz now does a (TTL-cached) SSM/KMS + Postgres probe (#404);
            # give the cache-miss request headroom over the 1s default and let
            # a transient blip flap a few times before marking not-ready.
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /livez, port: http}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: {cpu: 50m, memory: 192Mi}
            limits: {memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {sizeLimit: 64Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: grug-webhook
  namespace: grug
  labels: {app: grug-webhook}
spec:
  selector: {app: grug-webhook}
  ports:
    - {name: http, port: 8080, targetPort: http}
