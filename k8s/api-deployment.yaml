# grug-api on Kubernetes (#354). Image registry + tag are PLACEHOLDERS
# rewritten by the deploy workflow (sed from repository variables) - no
# registry host is committed to this public repo by design.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grug-api
  namespace: grug
  labels:
    app: grug-api
    tags.datadoghq.com/service: grug-api
    tags.datadoghq.com/env: prod
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: grug-api}
  template:
    metadata:
      labels:
        app: grug-api
        tags.datadoghq.com/service: grug-api
        tags.datadoghq.com/env: prod
    spec:
      automountServiceAccountToken: false
      # Images are built natively for arm64 only - without this pin a
      # mixed-arch cluster schedules onto amd64 and exec-format-errors
      # (review F2).
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: registry-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: webhook
          image: REGISTRY_PLACEHOLDER/grug-api:TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - {name: http, containerPort: 8080}
          envFrom:
            - secretRef: {name: grug-secrets}
          env:
            - {name: DD_SERVICE, value: grug-api}
            - {name: DD_ENV, value: prod}
            - name: DD_VERSION
              value: TAG_PLACEHOLDER
            - name: DD_AGENT_HOST
              valueFrom: {fieldRef: {fieldPath: status.hostIP}}
            - {name: DD_LOGS_INJECTION, value: "true"}
            - {name: GRUG_ENV, value: prod}
            - {name: GITHUB_APP_ID_SSM, value: /grug/github-app-id}
            - {name: GITHUB_APP_PRIVATE_KEY_SSM, value: /grug/github-app-private-key}
            - {name: GITHUB_APP_WEBHOOK_SECRET_SSM, value: /grug/github-app-webhook-secret}
            - {name: GITHUB_APP_CLIENT_ID_SSM, value: /grug/github-app-client-id}
            - {name: GITHUB_APP_CLIENT_SECRET_SSM, value: /grug/github-app-client-secret}
            - {name: GRUG_CF_SHARED_SECRET_SSM, value: /grug/cf-shared-secret}
            - {name: GRUG_OPENROUTER_API_KEY_SSM, value: /infra/llm/openrouter_api_key}
            - {name: GRUG_POOLSIDE_API_KEY_SSM, value: /infra/llm/poolside_api_key}
            - {name: GRUG_PROMPT_EXPERIMENT_SSM, value: /grug/elder-prompt-experiment}
            - {name: GRUG_FALLBACK_ENABLED_SSM, value: /grug/elder-fallback-enabled}
            - {name: DD_SITE, value: datadoghq.com}
            - {name: DD_LLMOBS_ENABLED, value: "true"}
            - {name: DD_LLMOBS_ML_APP, value: grug-elder}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /livez, port: http}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: {cpu: 50m, memory: 192Mi}
            limits: {memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {sizeLimit: 64Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: grug-api
  namespace: grug
  labels: {app: grug-api}
spec:
  selector: {app: grug-api}
  ports:
    - {name: http, port: 8080, targetPort: http}
