# AWS SDK config for the Roles Anywhere credential path (#388, ADR-0008).
# Mounted by grug-poller (the tracer workload); the ARNs are seeded by
# deploy.k8s.yml from SSM (/infra/roles-anywhere/trust_anchor_arn +
# /infra/roles-anywhere/grug/{profile_arn,role_arn}) - they carry the
# account id, so they reach this PUBLIC repo only as placeholders, never
# literals (same discipline as the registry/tag image pins - and do NOT
# name those tokens literally here: the post-sed sentinel greps ALL of
# k8s/ and a comment mention would fail every deploy; audit #388-8).
#
# The SDK runs aws_signing_helper (baked into the webhook image) per
# credential refresh: X.509 leaf (cert-manager Secret grug-pki-tls) ->
# Roles Anywhere -> ~1h STS session. --intermediates is REQUIRED: the
# trust anchor is the offline ROOT, so the chain must present the signing
# INTERMEDIATE - and it MUST come from the tls.crt bundle (cert #2),
# exactly as the ADR 0015 recipe words it. LIVE-DEBUGGED 2026-07-05: in
# THIS issuer topology ca.crt is the ROOT (cert-manager copies the
# issuer Secret's own ca.crt), so passing it as --intermediates presents
# leaf+root with no intermediate and Roles Anywhere 403s with
# "Untrusted signing certificate" (first deploy failed on it; offline
# openssl verify pinned the mechanism). The helper reads what it needs
# from the bundle; do not "clean this up" to ca.crt.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grug-aws-config
  namespace: grug
data:
  config: |
    [default]
    region = us-east-1
    credential_process = aws_signing_helper credential-process --certificate /var/run/grug-pki/tls.crt --private-key /var/run/grug-pki/tls.key --intermediates /var/run/grug-pki/tls.crt --trust-anchor-arn RA_TRUST_ANCHOR_ARN_PLACEHOLDER --profile-arn RA_PROFILE_ARN_PLACEHOLDER --role-arn RA_ROLE_ARN_PLACEHOLDER
