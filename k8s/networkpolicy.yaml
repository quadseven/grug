# Network segmentation for the grug namespace (audit #3).
#
# The OKE cluster is shared (grug runs as one of several tenant
# namespaces). Without a NetworkPolicy the namespace is flat /
# default-allow: any compromised pod anywhere on the cluster can reach the
# grug pods on any port, and a compromised grug pod has unrestricted
# egress. These policies close the lateral-movement path and add port-level
# egress hygiene.
#
# ENFORCEMENT NOTE: NetworkPolicy is only enforced by a policy-capable CNI.
# OKE's default VCN-native / flannel CNI does NOT enforce it unless Calico
# (or an equivalent) is installed. This manifest is harmless when
# unenforced and protective when enforced -- confirm the cluster CNI
# enforces NetworkPolicy for it to actually bite.
#
# Egress is intentionally restricted to PORTS, not CIDRs: grug talks to
# AWS (SSM/SQS/KMS/S3, 443), GitHub + the LLM backends (443), CNPG
# Postgres (5432), and the node-local Datadog agent (DogStatsD 8125 / APM
# 8126), plus DNS. Pinning destination CIDRs is the follow-up hardening;
# port-scoping already blocks exfil over non-standard channels without
# risking an outage from a wrong CIDR.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: grug
spec:
  # Empty podSelector = every pod in the namespace.
  podSelector: {}
  policyTypes: [Ingress]
  # No ingress rules => deny ALL inbound to every grug pod by default.
  # The allow-rule below re-opens only what must be reachable.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-http-ingress
  namespace: grug
spec:
  # Only the two HTTP services accept inbound; consumer + poller stay
  # fully sealed (they pull work from SQS / run on a cron, never serve).
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [grug-api, grug-webhook]}
  policyTypes: [Ingress]
  ingress:
    # Port 8080 only. `from` is omitted so the Cloudflare tunnel
    # (cloudflared) can reach it regardless of which namespace it runs in;
    # the real request auth is the CF shared-secret + HMAC/session layers.
    # Tightening `from` to the tunnel pod is a follow-up once its labels
    # are pinned.
    - ports:
        - {protocol: TCP, port: 8080}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-scoped
  namespace: grug
spec:
  # Every grug pod EXCEPT the Smasher Trial pods (#469): those run
  # PR-author code and get a TIGHTER egress policy (allow-egress-trial
  # below) that omits Postgres / spark-gateway / the DD agent. Excluding
  # them here is what makes that tighter policy actually bite - NetworkPolicy
  # rules are additive, so a pod selected by BOTH would get the union.
  podSelector:
    matchExpressions:
      - {key: grug-trial, operator: NotIn, values: ["true"]}
  policyTypes: [Egress]
  egress:
    # DNS resolution.
    - ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    # HTTPS: AWS APIs, GitHub, LLM backends.
    - ports:
        - {protocol: TCP, port: 443}
    # CNPG Postgres.
    - ports:
        - {protocol: TCP, port: 5432}
    # In-cluster spark-gateway (exposed-secret judge, #439 / ADR-0009).
    # Namespace-scoped (unlike the port-only rules above - this dest is
    # a single known namespace, so the CIDR-pinning follow-up is free).
    - to:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: spark-gateway}
          podSelector:
            matchLabels: {app: spark-gateway}  # the Service's own selector
      ports:
        - {protocol: TCP, port: 8080}
    # Node-local Datadog agent: DogStatsD (UDP 8125) + APM trace intake
    # (TCP 8126). Restricting these would silently kill observability.
    - ports:
        - {protocol: UDP, port: 8125}
        - {protocol: TCP, port: 8126}
---
# Smasher Trial pods (#469, ADR-0013) run PR-author code. Their egress is the
# MINIMUM the fetch + dependency-install init phases need - DNS + 443 (GitHub
# tarball + PyPI wheels) - and NOTHING else: no Postgres (5432), no
# spark-gateway, no cluster-internal reach. The `test` phase makes no network
# calls by construction and holds no credential.
#
# ENFORCEMENT CAVEAT (load-bearing, ADR-0013): NetworkPolicy is only enforced by
# a policy-capable CNI. This cluster runs flannel (does NOT enforce), so this
# policy is INERT here today and the real isolation is credential-denial (the
# test phase has no token / no secrets). A policy CNI (Calico/Cilium) is the
# documented operator PRECONDITION for enabling Smasher on a cluster.
#
# NOTE: pod-level NetworkPolicy cannot grant egress to the init phase while
# denying it to the test phase (they share the pod's network namespace). The
# test phase's network-denial is therefore by-construction (it makes no calls)
# + this scoping, NOT per-container enforcement.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-trial
  namespace: grug
spec:
  podSelector:
    matchLabels: {grug-trial: "true"}
  policyTypes: [Egress]
  egress:
    # DNS resolution.
    - ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    # HTTPS ONLY: the GitHub tarball (init `fetch`) + PyPI wheels (init `deps`).
    - ports:
        - {protocol: TCP, port: 443}
