# Reaction poller (#354): the EventBridge-scheduled Lambda becomes a
# CronJob invoking the SAME handler. Image placeholders rewritten at
# deploy like the Deployments.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: grug-poller
  namespace: grug
  labels: {app: grug-poller}
spec:
  # UNSUSPENDED at the cutover: the Lambda poller (and its EventBridge
  # schedule) retired 2026-06-12 - this CronJob is now the ONLY poller,
  # so there is no double-submit risk. (It shipped suspend:true while
  # the Lambda still ran; flipping it was part of the api cutover PR.)
  suspend: false
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: grug-poller
            tags.datadoghq.com/service: grug-poller
            tags.datadoghq.com/env: prod
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          nodeSelector:
            kubernetes.io/arch: arm64
          imagePullSecrets:
            - name: registry-pull
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile: {type: RuntimeDefault}
          containers:
            - name: poller
              image: REGISTRY_PLACEHOLDER/grug-webhook:TAG_PLACEHOLDER
              # ddtrace-run so poller spans are not silently dropped (review F4).
              command: ["ddtrace-run", "python", "-c", "from poller_handler import handler; handler({}, None)"]
              # envFrom is APP CONFIG ONLY (#388): the static AWS key pair
              # lives in the separate grug-aws-static-key Secret, which the
              # poller deliberately does NOT receive - env credentials would
              # out-rank credential_process in the SDK chain and silently
              # bypass the Roles Anywhere path this tracer exists to prove.
              envFrom:
                - secretRef: {name: grug-secrets}
              env:
                - {name: AWS_CONFIG_FILE, value: /etc/grug-aws/config}
                - {name: DD_SERVICE, value: grug-poller}
                - {name: DD_ENV, value: prod}
                - name: DD_VERSION
                  value: TAG_PLACEHOLDER
                - name: DD_AGENT_HOST
                  valueFrom: {fieldRef: {fieldPath: status.hostIP}}
                - {name: GRUG_ENV, value: prod}
                - {name: GITHUB_APP_ID_SSM, value: /grug/github-app-id}
                - {name: GITHUB_APP_PRIVATE_KEY_SSM, value: /grug/github-app-private-key}
                - {name: GITHUB_APP_WEBHOOK_SECRET_SSM, value: /grug/github-app-webhook-secret}
                - {name: GITHUB_APP_CLIENT_ID_SSM, value: /grug/github-app-client-id}
                - {name: GITHUB_APP_CLIENT_SECRET_SSM, value: /grug/github-app-client-secret}
                - {name: GRUG_CF_SHARED_SECRET_SSM, value: /grug/cf-shared-secret}
                - {name: GRUG_OPENROUTER_API_KEY_SSM, value: /infra/llm/openrouter_api_key}
                - {name: GRUG_POOLSIDE_API_KEY_SSM, value: /infra/llm/poolside_api_key}
                - {name: GRUG_PROMPT_EXPERIMENT_SSM, value: /grug/elder-prompt-experiment}
                - {name: GRUG_FALLBACK_ENABLED_SSM, value: /grug/elder-fallback-enabled}
                - {name: DD_SITE, value: datadoghq.com}
                - {name: DD_LLMOBS_ENABLED, value: "true"}
                - {name: DD_LLMOBS_ML_APP, value: grug-elder}
              resources:
                requests: {cpu: 50m, memory: 192Mi}
                limits: {memory: 512Mi}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
              volumeMounts:
                - {name: tmp, mountPath: /tmp}
                # Roles Anywhere tracer (#388, ADR-0008): the poller is the
                # FIRST workload on cert-derived short-lived creds. The SDK
                # reads AWS_CONFIG_FILE -> credential_process ->
                # aws_signing_helper (in the image) with the mounted leaf.
                - {name: grug-pki, mountPath: /var/run/grug-pki, readOnly: true}
                - {name: aws-config, mountPath: /etc/grug-aws, readOnly: true}
          volumes:
            - name: tmp
              emptyDir: {sizeLimit: 64Mi}
            - name: grug-pki
              secret:
                secretName: grug-pki-tls
            - name: aws-config
              configMap:
                name: grug-aws-config
