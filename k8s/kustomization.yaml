# grug on Kubernetes (#354). Applied by the deploy workflow after image
# placeholders are pinned. Secrets (grug-secrets, registry-pull) are
# seeded by the workflow from the parameter store -
# never committed; the Roles Anywhere ARNs in grug-aws-config are seeded
# the same way (#388).
resources:
  - namespace.yaml
  - networkpolicy.yaml
  - smasher-rbac.yaml
  - smasher-trial-namespace.yaml
  - webhook-deployment.yaml
  - api-deployment.yaml
  - poller-cronjob.yaml
  - consumer-deployment.yaml
  - pki-certificate.yaml
  - grug-aws-config.yaml
